<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAR Fleet Master Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* BRANDING VARIABLES */
        :root { 
            --color-primary: #003811; 
            --color-secondary: #D4AF37; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #F3F4F6; 
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .modal-overlay { 
            position: fixed; inset: 0; z-index: 999; 
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); 
            display: flex; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-box { 
            background: white; width: 100%; max-width: 600px; 
            border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-height: 90vh; display: flex; flex-direction: column; overflow: visible; 
        }
        .search-results-box { 
            position: absolute; width: 100%; max-height: 200px; overflow-y: auto; 
            z-index: 2000; background: white; border: 1px solid #d1d5db; 
            border-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); top: 100%; left: 0; 
        }

        /* PRINT STYLES - FORMAL REPORT */
        @media print { 
            @page { size: portrait; margin: 15mm; }
            body { background: white !important; font-family: 'Times New Roman', Times, serif !important; color: black !important; }
            .no-print { display: none !important; } 
            
            body:not(.printing-table) .print-area { display: block !important; width: 100% !important; background: white; padding: 0 !important; }
            body:not(.printing-table) .card-item { border: 1px solid #e2e8f0 !important; margin-bottom: 15px; break-inside: avoid; padding: 20px; border-radius: 0; box-shadow: none !important; }
            
            body.printing-table #app { display: none !important; }
            body.printing-table #print-table-section { display: block !important; width: 100%; background: white; }
            
            .formal-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11pt; }
            .formal-table th, .formal-table td { border: 1px solid black; padding: 8px; text-align: left; vertical-align: top; }
            .formal-table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; font-weight: bold; text-align: center; }
            .header-text { text-align: center; line-height: 1.2; margin-bottom: 30px; }
            .signatures { margin-top: 50px; display: flex; justify-content: space-between; }
            .sig-block { width: 40%; text-align: center; }
            .sig-line { border-bottom: 1px solid black; margin-bottom: 5px; height: 40px; }
        }
        
        #print-table-section { display: none; }
    </style>
</head>
<body class="p-8 text-gray-800">

    <div id="app" class="max-w-[1400px] mx-auto min-h-[80vh] flex flex-col relative">
        <div class="flex-grow flex flex-col justify-center items-center h-[60vh] opacity-50">
            <span class="text-4xl">🔄</span>
            <p class="font-bold mt-4 text-sm uppercase tracking-widest text-[#003811]">Authenticating Secure Fleet Link...</p>
        </div>
    </div>

    <div id="print-table-section" class="max-w-7xl mx-auto bg-white z-[9999]"></div>

    <script>
        // NOTE: No revision should be made to this code structure unless explicitly instructed.
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        const VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let user = null, currentTab = 'inbox', scheduleFilter = 'day'; 
        let emps = [], orders = [], itins = [], bookings = [];
        let activeRef = "", activeIsBooking = false, selectedEmpForAdd = null, activeVehForMaint = "";
        let manualPassengerQueue = [];

        // --- SESSION MANAGEMENT ---
        document.addEventListener("DOMContentLoaded", async () => {
            const savedUser = sessionStorage.getItem('currentUser');
            
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            
            user = JSON.parse(savedUser);
            
            // Explicitly verify the role 
            if (user.role !== 'VEHICLE_APPROVER') {
                alert("Access Denied. Only Dispatchers (Vehicle Approvers) can access the Fleet console.");
                window.location.href = 'index.html';
                return;
            }

            await initializeApp();
        });

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function initializeApp() {
            const {data: e} = await db.from('employees').select('*');
            emps = e || []; 
            renderDashboard(); 
        }

        // --- CORE DATA SYNC ---
        async function sync() {
            const [o, i, b] = await Promise.all([
                db.from('travel_orders').select('*').neq('status','CANCELLED'), 
                db.from('itinerary').select('*'),
                db.from('fleet_bookings').select('*')
            ]);
            orders = o.data || []; itins = i.data || []; bookings = b.data || [];
            if(currentTab === 'inbox') renderInbox();
            else if(currentTab === 'reservations') renderReservations();
            else renderSchedule();
        }

        function getApprovalTarget(unitStr) {
            const unit = (unitStr || "").toUpperCase().trim();
            if (unit === "PARPO") return "PENDING_PARPO";
            return (unit && unit !== "NULL") ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF";
        }

        function formatTo12Hour(timeStr) {
            if (!timeStr) return "";
            let [h, m] = timeStr.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${m} ${ampm}`;
        }

        function getVerificationStatus(text) {
            if (!text) return 'PENDING';
            if (text.includes('[ACTUALIZED]')) return 'ACTUALIZED';
            if (text.includes('[NO-SHOW]')) return 'NO-SHOW';
            return 'PENDING';
        }

        function cleanText(text) {
            if (!text) return '';
            return text.replace(/\[ACTUALIZED\]/g, '').replace(/\[NO-SHOW\]/g, '').trim();
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <div class="w-full flex flex-col h-full relative">
                <header class="flex justify-between items-center mb-6 no-print">
                    <div>
                        <h1 class="text-3xl font-bold text-[#003811]">DAR Fleet Master Pro</h1>
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-wide">Republic of the Philippines | Provincial Office of Camarines Sur 1</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="text-right">
                            <p class="font-bold text-[#003811] text-sm">${user.full_name}</p>
                            <p class="text-xs text-gray-500 font-semibold uppercase">Dispatcher</p>
                        </div>
                        <button onclick="sync()" class="p-2 text-gray-500 hover:text-[#003811] transition-colors" title="Sync Data">🔄</button>
                        <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded font-bold hover:bg-red-700 transition-colors">Logout</button>
                    </div>
                </header>
                
                <nav class="bg-white rounded-lg shadow mb-8 flex items-center justify-between p-2 no-print shrink-0">
                    <div class="flex space-x-2">
                        <button onclick="switchTab('inbox')" class="px-6 py-2 rounded font-bold text-sm transition-colors ${currentTab==='inbox'?'bg-[#003811] text-white':'text-gray-600 hover:bg-gray-100'}">📥 Inbox (TOs)</button>
                        <button onclick="switchTab('reservations')" class="px-6 py-2 rounded font-bold text-sm transition-colors ${currentTab==='reservations'?'bg-[#003811] text-white':'text-gray-600 hover:bg-gray-100'}">📋 Reservations</button>
                        <button onclick="switchTab('schedule')" class="px-6 py-2 rounded font-bold text-sm transition-colors ${currentTab==='schedule'?'bg-[#003811] text-white':'text-gray-600 hover:bg-gray-100'}">📅 Board & Verification</button>
                    </div>
                    <button onclick="openModal('bookModal')" class="bg-[#D4AF37] text-white px-6 py-2 rounded font-bold text-sm hover:bg-yellow-600 transition-colors shadow-sm flex items-center gap-2">
                        <span class="text-lg leading-none">+</span> Special Booking
                    </button>
                </nav>

                <main id="main-content" class="flex-grow w-full relative z-10 print-area overflow-y-visible pb-10"></main>
                
                ${modalsMarkup()}
            </div>`;
            sync();
        }

        function modalsMarkup() {
            return `
            <div id="bookModal" class="hidden modal-overlay">
                <div class="modal-box">
                    <div class="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
                        <h2 class="font-bold text-[#003811] text-lg">Special Fleet Booking</h2>
                        <button onclick="closeModal('bookModal')" class="text-gray-400 hover:text-red-500 font-bold text-xl leading-none">✕</button>
                    </div>
                    <div class="p-6 space-y-5 overflow-y-auto bg-white max-h-[60vh]">
                        <div class="border border-gray-200 bg-gray-50 p-4 rounded shadow-sm">
                            <label class="block text-sm font-bold text-[#003811] mb-2">Queue Passengers (First is Lead)</label>
                            <div class="flex gap-2 relative">
                                <input id="resPAdd" oninput="runEmpSearch(this, 'resPResults')" placeholder="Search and click a name..." class="flex-1 border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm">
                                <button onclick="queuePassenger()" class="bg-[#003811] text-white px-4 py-2 rounded font-bold text-sm hover:bg-green-800 transition-colors">Queue</button>
                                <div id="resPResults" class="search-results-box hidden"></div>
                            </div>
                            <div id="manualPList" class="mt-3 space-y-2 max-h-32 overflow-y-auto"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Start Date</label><input id="resD1" type="date" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">End Date</label><input id="resD2" type="date" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Departure Time</label><input id="resDepTime" type="time" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Arrival Time</label><input id="resArrTime" type="time" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Assignment / Type</label>
                                <select id="resS" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm font-semibold">
                                    <option>WHOLE DAY</option><option>AM</option><option>PM</option><option class="text-red-600 font-bold">DROP-OFF ONLY</option><option class="text-blue-600 font-bold">PICK-UP ONLY</option>
                                </select>
                            </div>
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Vehicle</label><select id="resV" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm font-semibold">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
                        </div>
                        <div><label class="block text-sm font-bold text-[#003811] mb-1">Driver (Editable)</label><input id="resDr" list="drivers" value="Driver 1" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm font-semibold"></div>
                        <div class="space-y-4 pt-4 border-t border-gray-200">
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Destination</label><input id="resDest" placeholder="e.g., DAR Regional Office..." class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Purpose / Details</label><input id="resP" placeholder="Reason for travel..." class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                        </div>
                    </div>
                    <div class="p-5 border-t flex justify-end gap-3 bg-gray-50 rounded-b-lg">
                        <button onclick="closeModal('bookModal')" class="px-6 py-2 text-gray-600 font-bold text-sm hover:bg-gray-200 rounded transition-colors">Cancel</button>
                        <button onclick="saveManual()" class="bg-[#003811] text-white px-6 py-2 rounded font-bold text-sm hover:bg-green-800 transition-colors">Confirm Booking</button>
                    </div>
                </div>
            </div>

            <div id="peopleModal" class="hidden modal-overlay">
                <div class="modal-box h-[600px]">
                    <div class="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
                        <div><h2 class="font-bold text-[#003811] text-lg">Manage Passengers</h2><p id="pSub" class="text-xs text-gray-500 font-bold uppercase mt-1"></p></div>
                        <button onclick="closeModal('peopleModal')" class="text-gray-400 hover:text-red-500 font-bold text-xl">✕</button>
                    </div>
                    <div id="pList" class="p-6 flex-1 space-y-3 overflow-y-auto bg-white"></div>
                    <div class="p-6 border-t bg-gray-50 relative shrink-0 rounded-b-lg">
                        <label class="block text-sm font-bold text-[#003811] mb-2">Add Passenger</label>
                        <div class="flex gap-3">
                            <div class="relative flex-1">
                                <input id="pAdd" oninput="runEmpSearch(this, 'pResults')" placeholder="Enter name..." class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm" autocomplete="off">
                                <div id="pResults" class="search-results-box hidden"></div>
                            </div>
                            <button onclick="handleAddPersonnel()" class="bg-[#003811] text-white px-6 py-2 rounded font-bold text-sm hover:bg-green-800 transition-colors">Add</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="transferModal" class="hidden modal-overlay"><div class="modal-box max-w-sm"><div class="p-5 border-b bg-gray-50 rounded-t-lg"><h2 class="font-bold text-[#003811] text-lg">Smart Transfer</h2><p id="tSub" class="text-xs text-gray-500 font-bold mt-1 uppercase"></p></div><div class="p-6 space-y-4 bg-white"><label class="block text-sm font-bold text-[#003811] mb-1">Available Fleet (Matching Dates)</label><select id="tSelect" class="w-full border border-gray-300 p-3 rounded focus:outline-none focus:border-[#003811] text-sm font-semibold"></select></div><div class="p-5 border-t flex justify-end gap-3 bg-gray-50 rounded-b-lg"><button onclick="closeModal('transferModal')" class="px-4 py-2 text-gray-600 font-bold text-sm hover:bg-gray-200 rounded transition-colors">Cancel</button><button id="tExec" class="bg-[#003811] text-white px-6 py-2 rounded font-bold text-sm hover:bg-green-800 transition-colors">Confirm</button></div></div></div>
            <div id="maintModal" class="hidden modal-overlay"><div class="modal-box max-w-sm"><div class="p-5 border-b bg-gray-50 rounded-t-lg"><h2 class="font-bold text-[#003811] text-lg">Schedule Maintenance</h2><p id="maintSub" class="text-xs text-gray-500 font-bold mt-1 uppercase"></p></div><div class="p-6 space-y-4 bg-white"><div><label class="block text-sm font-bold text-[#003811] mb-1">Reason</label><input id="maintReason" placeholder="e.g., Change Oil..." class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div><div><label class="block text-sm font-bold text-[#003811] mb-1">Start Date</label><input id="maintD1" type="date" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div><div><label class="block text-sm font-bold text-[#003811] mb-1">End Date</label><input id="maintD2" type="date" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div></div><div class="p-5 border-t flex justify-end gap-3 bg-gray-50 rounded-b-lg"><button onclick="closeModal('maintModal')" class="px-4 py-2 text-gray-600 font-bold text-sm hover:bg-gray-200 rounded transition-colors">Cancel</button><button onclick="saveMaintenance()" class="bg-red-600 text-white px-6 py-2 rounded font-bold text-sm hover:bg-red-700 transition-colors">Off-Road</button></div></div></div>
            
            <datalist id="drivers">${DRIVERS.map(d=>`<option value="${d}">`).join('')}</datalist>`;
        }

        // --- DASHBOARD FUNCTIONS ---
        function renderInbox() {
            const m = document.getElementById('main-content');
            const rawData = orders.filter(x => x.status === 'PENDING_VEHICLE_APPROVER' && x.transport === "GOV'T VEHICLE");
            if (!rawData.length) { m.innerHTML = `<div class="bg-white p-12 rounded-lg shadow text-center"><span class="text-4xl text-gray-300">✨</span><p class="font-bold text-gray-500 mt-4 text-sm uppercase">Queue Empty</p></div>`; return; }
            
            const grouped = {};
            rawData.forEach(o => {
                if(!grouped[o.to_no]) grouped[o.to_no] = [];
                grouped[o.to_no].push(o);
            });

            m.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">` + Object.values(grouped).map(group => {
                const o = group[0];
                const allNames = group.map(x => x.emp_name).join('<br> • ');
                const tripItins = itins.filter(i => i.to_no === o.to_no).sort((a,b) => new Date(a.travel_date) - new Date(b.travel_date));
                return `
                <div class="bg-white p-6 rounded-lg shadow flex flex-col relative border border-gray-200">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-gray-100">
                        <span class="text-xs font-bold text-[#003811] bg-green-50 px-2.5 py-1 rounded border border-green-100">TO: ${o.to_no}</span>
                        <button onclick="toLand('${o.to_no}', '${o.unit}')" class="text-blue-600 text-xs font-bold underline hover:text-blue-800 transition">LAND ENTIRE TRIP</button>
                    </div>
                    <h3 class="font-bold text-gray-800 text-sm mb-4 leading-snug">• ${allNames}</h3>
                    
                    <div class="mb-5 flex-1">
                        <h4 class="text-xs font-bold text-gray-500 mb-2 uppercase">Day-by-Day Dispatch Assignment</h4>
                        <div class="space-y-3">
                            ${tripItins.map(i => `
                                <div class="bg-gray-50 p-3 rounded border border-gray-200">
                                    <p class="text-xs font-bold text-[#003811] mb-2">${i.travel_date} <span class="text-gray-500 italic font-normal">(${i.destination})</span></p>
                                    <div class="grid grid-cols-2 gap-2 mb-2">
                                        <select id="v-${o.to_no}-${i.travel_date}" class="border border-gray-300 rounded p-1.5 text-xs font-semibold text-[#003811] focus:outline-none focus:border-[#003811]">
                                            <option disabled selected hidden>Vehicle...</option>
                                            <option value="LAND" class="text-red-600">LAND (No Gov Veh)</option>
                                            ${VEHICLES.map(v=>`<option value="${v}">${v}</option>`).join('')}
                                        </select>
                                        <select id="s-${o.to_no}-${i.travel_date}" class="border border-gray-300 rounded p-1.5 text-xs font-semibold text-gray-700 focus:outline-none focus:border-[#003811]">
                                            <option>WHOLE DAY</option><option>AM</option><option>PM</option><option>DROP-OFF ONLY</option><option>PICK-UP ONLY</option>
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <input id="d-${o.to_no}-${i.travel_date}" list="drivers" placeholder="Driver..." class="border border-gray-300 rounded p-1.5 text-xs font-semibold focus:outline-none focus:border-[#003811]">
                                        <input id="t-${o.to_no}-${i.travel_date}" type="time" title="Departure Time" class="border border-gray-300 rounded p-1.5 text-xs font-semibold text-gray-700 focus:outline-none focus:border-[#003811]">
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-auto pt-2 border-t border-gray-100">
                        <button onclick="approveTripDayByDay('${o.to_no}', '${o.unit}')" class="bg-[#003811] text-white px-4 py-2.5 rounded text-xs font-bold hover:bg-green-800 transition w-full shadow-sm">Confirm Setup & Approve</button>
                    </div>
                </div>`;
            }).join('') + `</div>`;
        }

        async function approveTripDayByDay(to, unit) {
            const tripItins = itins.filter(i => i.to_no === to).sort((a,b) => new Date(a.travel_date) - new Date(b.travel_date));
            if (!tripItins.length) return alert("No itinerary dates found for this TO.");

            let receivedObj = {};
            let driverObj = {};
            let remarksObj = {};
            let allLand = true;

            for (let i of tripItins) {
                const date = i.travel_date;
                const vSelect = document.getElementById(`v-${to}-${date}`);
                
                if (!vSelect || vSelect.value === "Vehicle...") return alert(`Please assign a vehicle or set LAND for ${date}.`);
                
                const v = vSelect.value;
                const s = document.getElementById(`s-${to}-${date}`).value;
                const d = document.getElementById(`d-${to}-${date}`).value || "TBD";
                const t = document.getElementById(`t-${to}-${date}`).value;
                
                let timeStr = s;
                if (t) timeStr = `${s} (${formatTo12Hour(t)} Onward)`;

                receivedObj[date] = v;
                driverObj[date] = v === 'LAND' ? 'N/A' : d;
                remarksObj[date] = v === 'LAND' ? 'LAND TRAVEL' : timeStr;

                if (v !== 'LAND') allLand = false;
            }

            const nextStatus = getApprovalTarget(unit);

            if (allLand) {
                const { error } = await db.from('travel_orders').update({ 
                    transport: 'LAND', received: null, driver: null, remarks: null, status: nextStatus 
                }).eq('to_no', to);
                if (error) alert("Database Error: " + error.message);
            } else {
                const { error } = await db.from('travel_orders').update({ 
                    received: JSON.stringify(receivedObj), driver: JSON.stringify(driverObj), remarks: JSON.stringify(remarksObj), status: nextStatus 
                }).eq('to_no', to);
                if (error) alert("Database Error: " + error.message);
            }
            sync();
        }

        async function toLand(to, unit) {
            await db.from('travel_orders').update({ transport: 'LAND', status: getApprovalTarget(unit), received: null, driver: null }).eq('to_no', to);
            sync();
        }

        function renderReservations() {
            const container = document.getElementById('main-content');
            const tos = orders.filter(x => x.transport === "GOV'T VEHICLE" && x.status !== 'PENDING_VEHICLE_APPROVER' && x.status !== 'OFF_ROAD' && x.remarks !== 'MAINTENANCE');
            const toGrp = {}; tos.forEach(x => { if(!toGrp[x.to_no]) toGrp[x.to_no] = []; toGrp[x.to_no].push(x); });
            const bkGrp = {}; bookings.forEach(x => { if(!bkGrp[x.ref_no]) bkGrp[x.ref_no] = []; bkGrp[x.ref_no].push(x); });

        async function verifyTrip(ref, type, date, status) {
            const tag = status === 'ACTUALIZED' ? '[ACTUALIZED]' : (status === 'NO-SHOW' ? '[NO-SHOW]' : '');
            
            if (type === 'TO') {
                const to = orders.find(o => o.to_no === ref);
                let currentRemarks = to.remarks || '';
                
                if (currentRemarks.startsWith('{')) {
                    const parsed = JSON.parse(currentRemarks);
                    let baseText = cleanText(parsed[date] || '');
                    parsed[date] = tag ? `${tag} ${baseText}` : baseText;
                    await db.from('travel_orders').update({ remarks: JSON.stringify(parsed) }).eq('to_no', ref);
                } else {
                    let baseText = cleanText(currentRemarks);
                    await db.from('travel_orders').update({ remarks: tag ? `${tag} ${baseText}` : baseText }).eq('to_no', ref);
                }
            } else {
                const bkList = bookings.filter(b => b.ref_no === ref && b.travel_date === date);
                if (bkList.length > 0) {
                    let baseText = cleanText(bkList[0].assignment || '');
                    await db.from('fleet_bookings').update({ assignment: tag ? `${tag} ${baseText}` : baseText }).eq('ref_no', ref).eq('travel_date', date);
                }
            }
            sync();
        }

                    if (displayRem.includes('[ACTUALIZED]')) rowStatus += " (ACTUALIZED)";
                    if (displayRem.includes('[NO-SHOW]')) rowStatus += " (NO-SHOW)";
                    
                    displayRem = cleanText(displayRem);

                    html += `<tr>
                        ${isFirst ? `<td rowspan="${vehicleTrips.length}" style="text-align: center; vertical-align: middle; font-weight: bold;">${v}</td>` : ''}
                        <td>${trip.date}</td>
                        <td>${trip.isMaint ? '<em>UNAVAILABLE (OFF-ROAD)</em>' : trip.passengers.join('<br>')}</td>
                        <td>${trip.dest}<br><em>${trip.purpose}</em></td>
                        <td><strong>${rowStatus}</strong><br>${displayRem}</td>
                    </tr>`;
                    isFirst = false;
                });
            });

            if (!hasRecords) {
                html += `<tr><td colspan="5" style="text-align: center; padding: 20px;"><em>No dispatch records found for this period.</em></td></tr>`;
            }

            html += `</tbody></table>
                <div class="signatures">
                    <div class="sig-block">
                        <p style="text-align: left; margin-bottom: 30px;">Prepared by:</p>
                        <div class="sig-line"></div>
                        <p style="margin: 0; font-weight: bold; text-transform: uppercase;">${user ? user.full_name : 'DISPATCHER'}</p>
                        <p style="margin: 0; font-size: 10pt;">Dispatcher / Fleet Controller</p>
                    </div>
                    <div class="sig-block">
                        <p style="text-align: left; margin-bottom: 30px;">Noted by:</p>
                        <div class="sig-line"></div>
                        <p style="margin: 0; font-weight: bold; text-transform: uppercase;">PARPO II / HEAD OF OFFICE</p>
                        <p style="margin: 0; font-size: 10pt;">Provincial Agrarian Reform Program Officer II</p>
                    </div>
                </div>
            `;

            printSec.innerHTML = html;
            
            document.body.classList.add('printing-table');
            setTimeout(() => {
                window.print();
                document.body.classList.remove('printing-table');
            }, 300);
        }

        // --- SEARCH & UNIVERSAL BOOKING ASSIGNMENT ---
        async function isDoubleBooked(empName, checkDates) {
            const empTrips = orders.filter(o => o.emp_name === empName && o.status !== 'CANCELLED' && o.transport === "GOV'T VEHICLE");
            for (let trip of empTrips) {
                const tripDates = itins.filter(i => i.to_no === trip.to_no).map(i => i.travel_date);
                if(tripDates.some(d => checkDates.includes(d))) return true;
            }
            const bks = bookings.filter(b => b.emp_name === empName && checkDates.includes(b.travel_date));
            return bks.length > 0;
        }

        function runEmpSearch(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase().trim();
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => `<div onclick="pickPersonnel('${safeStr(e.full_name)}','${resId}','${inp.id}','${safeStr(e.emp_id)}')" class="p-4 border-b border-gray-100 text-sm font-bold active:bg-gray-100 cursor-pointer uppercase text-gray-700 hover:bg-gray-50 transition">${e.full_name}</div>`).join('');
            div.classList.remove('hidden');
        }

        function pickPersonnel(n, rId, iId, eId) {
            document.getElementById(iId).value = n;
            document.getElementById(rId).classList.add('hidden');
            if(iId === 'pAdd' || iId === 'resPAdd') selectedEmpForAdd = { n, id: eId };
        }

        function queuePassenger() {
            if(!selectedEmpForAdd) return alert("Search and click a name first.");
            manualPassengerQueue.push(selectedEmpForAdd);
            document.getElementById('resPAdd').value = "";
            selectedEmpForAdd = null;
            renderManualPList();
        }

        function renderManualPList() {
            document.getElementById('manualPList').innerHTML = manualPassengerQueue.map((p, idx) => `
                <div class="flex justify-between items-center bg-white p-3 rounded text-xs font-bold uppercase border ${idx===0 ? 'border-[#003811] shadow-sm' : 'border-gray-200'}">
                    <span>${p.n} ${idx===0 ? '<span class="ml-2 bg-[#003811] text-white text-[10px] px-2 py-1 rounded">LEAD</span>' : ''}</span>
                    <button onclick="manualPassengerQueue.splice(${idx},1);renderManualPList();" class="text-red-500 font-bold hover:scale-110 px-2 transition">✕</button>
                </div>`).join('');
        }

        async function saveManual() {
            const d1 = document.getElementById('resD1').value, d2 = document.getElementById('resD2').value;
            const assign = document.getElementById('resS').value, v = document.getElementById('resV').value, dr = document.getElementById('resDr').value;
            const dest = document.getElementById('resDest').value.trim(), p = document.getElementById('resP').value.trim();
            const depT = document.getElementById('resDepTime').value, arrT = document.getElementById('resArrTime').value;
            
            if(!d1 || !dest || !p) return alert("Missing Start Date, Destination, or Purpose.");
            if(manualPassengerQueue.length === 0) return alert("Please queue at least one passenger.");

            let st = new Date(d1), en = new Date(d2 || d1), dates = [];
            while(st <= en) { dates.push(st.toISOString().split('T')[0]); st.setDate(st.getDate() + 1); }

            for (let pass of manualPassengerQueue) {
                if (await isDoubleBooked(pass.n, dates)) return alert(`Blocked: ${pass.n} is already assigned a vehicle on these dates!`);
            }

            let timeStr = assign;
            if (depT && arrT) timeStr = `${assign} (${formatTo12Hour(depT)} - ${formatTo12Hour(arrT)})`;
            else if (depT) timeStr = `${assign} (${formatTo12Hour(depT)} Onward)`;

            const fleetPayload = [];
            const toUpdates = []; 
            const ref = `BK-${Math.floor(Date.now()%100000)}`;

            for (let pass of manualPassengerQueue) {
                const passTOs = orders.filter(o => o.emp_name === pass.n && o.status !== 'CANCELLED' && (o.transport !== "GOV'T VEHICLE" || !o.transport));
                
                let matchedTO = null;
                for (let to of passTOs) {
                    const toDates = itins.filter(i => i.to_no === to.to_no).map(i => i.travel_date);
                    if (toDates.some(d => dates.includes(d))) { matchedTO = to.to_no; break; }
                }

                if (matchedTO) toUpdates.push(matchedTO);
                else {
                    for (let date of dates) {
                        fleetPayload.push({ ref_no: ref, emp_name: pass.n, emp_id: pass.id, travel_date: date, destination: dest, purpose: p, vehicle: v, driver: dr, assignment: timeStr });
                    }
                }
            }

            if (fleetPayload.length > 0) await db.from('fleet_bookings').insert(fleetPayload);
            
            for (let to of [...new Set(toUpdates)]) {
                const toRec = orders.find(x => x.to_no === to);
                await db.from('travel_orders').update({ transport: "GOV'T VEHICLE", received: v, driver: dr, remarks: timeStr, status: getApprovalTarget(toRec.unit) }).eq('to_no', to);
            }
            
            manualPassengerQueue = []; document.getElementById('resDest').value = ""; document.getElementById('resP').value = "";
            renderManualPList(); closeModal('bookModal'); sync();
        }

        async function handleAddPersonnel() {
            if(!selectedEmpForAdd) return alert("Search and click a name first.");
            if (activeIsBooking) {
                const { data } = await db.from('fleet_bookings').select('*').eq('ref_no', activeRef);
                if(!data || !data.length) return;
                const dates = [...new Set(data.map(d => d.travel_date))];
                if (await isDoubleBooked(selectedEmpForAdd.n, dates)) return alert(`${selectedEmpForAdd.n} is already assigned a vehicle on these dates.`);
                const template = data[0];
                const payload = dates.map(d => ({ ref_no: activeRef, emp_name: selectedEmpForAdd.n, emp_id: selectedEmpForAdd.id, travel_date: d, destination: template.destination, purpose: template.purpose, vehicle: template.vehicle, driver: template.driver, assignment: template.assignment }));
                await db.from('fleet_bookings').insert(payload);
            } else {
                const head = orders.find(o => o.to_no === activeRef);
                const toDates = itins.filter(i => i.to_no === activeRef).map(i => i.travel_date);
                if (await isDoubleBooked(selectedEmpForAdd.n, toDates)) return alert(`${selectedEmpForAdd.n} is already assigned a vehicle on these dates.`);
                const row = { ...head, emp_name: selectedEmpForAdd.n, emp_id: selectedEmpForAdd.id }; delete row.id; delete row.created_at;
                await db.from('travel_orders').insert([row]);
            }
            document.getElementById('pAdd').value = ""; selectedEmpForAdd = null; await renderPList(); await sync();
        }

        async function doRemovePerson(id, name) { 
            if(activeIsBooking) await db.from('fleet_bookings').delete().eq('ref_no', activeRef).eq('emp_name', name);
            else await db.from('travel_orders').delete().eq('id', id); 
            await renderPList(); sync(); 
        }

        function switchTab(t) { currentTab = t; renderDashboard(); }
        function setFilter(f) { scheduleFilter = f; renderSchedule(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function safeStr(str) { return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
        
        function setOffRoad(veh) { activeVehForMaint = veh; document.getElementById('maintSub').innerText = `Vehicle: ${veh}`; document.getElementById('maintD1').value = ""; document.getElementById('maintD2').value = ""; document.getElementById('maintReason').value = ""; openModal('maintModal'); }
        async function saveMaintenance() { const d1 = document.getElementById('maintD1').value, d2 = document.getElementById('maintD2').value, reason = document.getElementById('maintReason').value || "Routine Maintenance"; if(!d1) return alert("Select at least a start date."); const to = `MAINT-${Math.floor(Date.now()%10000)}`; await db.from('travel_orders').insert({ to_no: to, emp_name: '🚨 UNAVAILABLE', received: activeVehForMaint, remarks: 'MAINTENANCE', status: 'OFF_ROAD', transport: "GOV'T VEHICLE" }); let st = new Date(d1), en = new Date(d2 || d1); while(st <= en) { await db.from('itinerary').insert({ to_no: to, travel_date: st.toISOString().split('T')[0], destination: "Authorized Shop", purpose: reason }); st.setDate(st.getDate() + 1); } closeModal('maintModal'); sync(); }
        async function endMaintenance(to) { if(!confirm("Maintenance finished? This clears remaining schedules.")) return; const now = new Date(); const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0'); await db.from('itinerary').delete().eq('to_no', to).gte('travel_date', `${y}-${m}-${d}`); const remaining = await db.from('itinerary').select('id').eq('to_no', to); if(!remaining.data || remaining.data.length === 0) await db.from('travel_orders').delete().eq('to_no', to); sync(); }
        async function smartTransfer(toNo, curV) { activeRef = toNo; const dates = itins.filter(i => i.to_no === toNo).map(i => i.travel_date); const busy = orders.filter(o => o.status !== 'CANCELLED' && o.to_no !== toNo && o.transport === "GOV'T VEHICLE" && itins.filter(i => i.to_no === o.to_no).some(d => dates.includes(d.travel_date))).map(o => ({ v: o.received, to: o.to_no, drv: o.driver })); const opts = VEHICLES.filter(v => v !== curV).map(v => { const m = busy.find(b => b.v === v); return `<option value="${v}" data-drv="${m?m.drv:''}">${v} ${m ? `(JOIN #${m.to})` : '(AVAIL)'}</option>`; }).join(''); document.getElementById('tSub').innerText = `ID #${toNo}`; document.getElementById('tSelect').innerHTML = opts; document.getElementById('tExec').onclick = async () => { const targetV = document.getElementById('tSelect').value, targetD = document.getElementById('tSelect').options[document.getElementById('tSelect').selectedIndex].dataset.drv; await db.from('travel_orders').update({ received: targetV, driver: targetD || orders.find(o=>o.to_no===toNo).driver }).eq('to_no', toNo); closeModal('transferModal'); sync(); }; openModal('transferModal'); }
    </script>
