<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #F3F4F6; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .modal-overlay { 
            position: fixed; inset: 0; z-index: 999; 
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); 
            display: flex; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-box { 
            background: white; width: 100%; max-width: 600px; 
            border-radius: 0.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-height: 90vh; display: flex; flex-direction: column; overflow: visible; 
        }
        .search-results-box { 
            position: absolute; width: 100%; max-height: 200px; overflow-y: auto; 
            z-index: 2000; background: white; border: 1px solid #d1d5db; 
            border-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); top: 100%; left: 0; 
        }

        /* PRINT STYLES - FORMAL REPORT */
        @media print { 
            @page { size: portrait; margin: 15mm; }
            body { background: white !important; font-family: 'Times New Roman', Times, serif !important; color: black !important; }
            .no-print { display: none !important; } 
            
            body:not(.printing-table) .print-area { display: block !important; width: 100% !important; background: white; padding: 0 !important; }
            body:not(.printing-table) .card-item { border: 1px solid #e2e8f0 !important; margin-bottom: 15px; break-inside: avoid; padding: 20px; border-radius: 0; box-shadow: none !important; }
            
            body.printing-table #app-layout { display: none !important; }
            body.printing-table #print-table-section { display: block !important; width: 100%; background: white; }
            
            .formal-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11pt; }
            .formal-table th, .formal-table td { border: 1px solid black; padding: 8px; text-align: left; vertical-align: top; }
            .formal-table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; font-weight: bold; text-align: center; }
            .header-text { text-align: center; line-height: 1.2; margin-bottom: 30px; }
            .signatures { margin-top: 50px; display: flex; justify-content: space-between; }
            .sig-block { width: 40%; text-align: center; }
            .sig-line { border-bottom: 1px solid black; margin-bottom: 5px; height: 40px; }
        }
        
        #print-table-section { display: none; }
    </style>
</head>

    <script>
        // Supabase Configuration
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        const VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let user = null, currentTab = 'inbox', scheduleFilter = 'day'; 
        let emps = [], orders = [], itins = [], bookings = [], vehLogs = [];
        let activeRef = "", activeIsBooking = false, selectedEmpForAdd = null, activeVehForMaint = "";
        let manualPassengerQueue = [];
        
        let activeReservationGroups = {};
        let editPassRef = "", editPassType = "", currentPassList = [], removedPassList = [], addedPassList = [];
        let currentEditTrip = {}; 
        let currentTransfer = {};

        let scheduleDateStr = new Date().toISOString().split('T')[0];
        let logsMonthStr = new Date().toISOString().slice(0, 7);

        // --- SESSION AND AUTH ---
        document.addEventListener("DOMContentLoaded", async () => {
            const savedUser = sessionStorage.getItem('currentUser');
            if (!savedUser) { window.location.href = 'index.html'; return; }
            
            user = JSON.parse(savedUser);
            if(document.getElementById('activeUser')) document.getElementById('activeUser').innerText = user.full_name;
            if(document.getElementById('userRoleBadge')) document.getElementById('userRoleBadge').innerText = user.role || '';

            const uRole = String(user.role).toUpperCase();
            const uPos = String(user.position).toUpperCase();

            if (uRole !== 'VEHICLE_APPROVER' && !uPos.includes('PARPO')) {
                alert("Access Denied. Only Vehicle Approvers and PARPO can access the Fleet Dispatch console.");
                window.location.href = 'dashboard.html';
                return;
            }

            if (uRole === 'VEHICLE_APPROVER') {
                const navLinks = document.querySelectorAll('.nav-link');
                navLinks.forEach(link => {
                    if (!link.href.includes('fleet.html')) {
                        link.classList.add('hidden');
                    }
                });
            }

            await initializeApp();
        });

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function initializeApp() {
            const {data: e} = await db.from('employees').select('*');
            emps = e || []; 
            renderDashboardLayout(); 
        }

        // --- CORE DATA SYNC ---
        async function sync() {
            const [o, i, b, vl] = await Promise.all([
                db.from('travel_orders').select('*').neq('status','CANCELLED'), 
                db.from('itinerary').select('*'),
                db.from('fleet_bookings').select('*'),
                db.from('vehicle_logs').select('*')
            ]);
            orders = o.data || []; itins = i.data || []; bookings = b.data || []; vehLogs = vl.data || [];
            
            if(currentTab === 'inbox') renderInbox();
            else if(currentTab === 'reservations') renderReservations();
            else if(currentTab === 'schedule') renderSchedule();
            else renderLogs();
        }

        function getApprovalTarget(unitStr) {
            const unit = (unitStr || "").toUpperCase().trim();
            if (unit === "PARPO") return "PENDING_PARPO";
            return (unit && unit !== "NULL") ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF";
        }

        function formatTo12Hour(timeStr) {
            if (!timeStr) return "";
            let [h, m] = timeStr.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${m} ${ampm}`;
        }

        function getDailyValue(rawStr, date, defaultVal) {
            if (!rawStr) return defaultVal;
            if (rawStr.startsWith('{')) {
                try {
                    const parsed = JSON.parse(rawStr);
                    return parsed[date] !== undefined ? parsed[date] : defaultVal;
                } catch(e) { return rawStr; }
            }
            return rawStr;
        }

        function cleanText(text) {
            return text ? text.replace(/\[COMPLETED\]/g, '').replace(/\[ACTUALIZED\]/g, '').replace(/\[NO-SHOW\]/g, '').trim() : '';
        }

        function escQ(str) { 
            return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); 
        }

        // --- DASHBOARD RENDERING ---
        function renderDashboardLayout() {
            document.getElementById('app').innerHTML = `

                    </div>
                    <div class="flex items-center space-x-3">
                        <button onclick="sync()" class="p-2 text-gray-500 hover:text-[#003811] transition-colors bg-white rounded-full shadow-sm" title="Refresh Data">🔄</button>
                    </div>

                <nav class="bg-white rounded-lg shadow-sm border border-gray-200 mb-6 flex items-center justify-between p-2 no-print shrink-0">
                    <div class="flex space-x-1">

                        <button onclick="switchTab('reservations')" class="px-5 py-2.5 rounded font-bold text-sm transition-colors ${currentTab==='reservations'?'bg-[#003811] text-white':'text-gray-600 hover:bg-gray-100'}">📋 Daily Active Trips</button>
                        <button onclick="switchTab('schedule')" class="px-5 py-2.5 rounded font-bold text-sm transition-colors ${currentTab==='schedule'?'bg-[#003811] text-white':'text-gray-600 hover:bg-gray-100'}">📅 Fleet Availability</button>
                        <button onclick="switchTab('logs')" class="px-5 py-2.5 rounded font-bold text-sm transition-colors ${currentTab==='logs'?'bg-[#003811] text-white':'text-gray-600 hover:bg-gray-100'}">📊 Trip & Fleet Logs</button>
                    </div>
                    <button onclick="openModal('bookModal')" class="bg-[#D4AF37] text-black px-6 py-2 rounded font-bold text-sm hover:brightness-110 transition-colors shadow-sm flex items-center gap-2">
                        <span class="text-lg leading-none">+</span> Special Booking
                    </button>
                </nav>

                <main id="main-content" class="flex-grow w-full relative z-10 print-area overflow-y-visible pb-10"></main>
                ${modalsMarkup()}
            </div>`;
            sync();
        }

        function modalsMarkup() {
            return `

                    </div>

                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Start Date</label><input id="resD1" type="date" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">End Date</label><input id="resD2" type="date" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Departure Time</label><input id="resDepTime" type="time" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Arrival Time</label><input id="resArrTime" type="time" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">

                                </select>

                            <div><label class="block text-sm font-bold text-[#003811] mb-1">Purpose / Details</label><input id="resP" placeholder="Reason for travel..." class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811] text-sm"></div>
                        </div>
                    </div>
                    <div class="p-5 border-t flex justify-end gap-3 bg-gray-50 rounded-b-lg">
                        <button onclick="closeModal('bookModal')" class="px-6 py-2 text-gray-600 font-bold text-sm hover:bg-gray-200 rounded transition-colors">Cancel</button>

            <!-- EDIT PASSENGERS MODAL -->

                    </div>
                    <div class="p-6 space-y-4 bg-white">
                        <div class="bg-blue-50 border border-blue-200 text-blue-800 text-xs p-3 rounded mb-2">
                            <strong>Note:</strong> Adding or removing passengers here will directly update the official manifest for this vehicle dispatch.

        async function approveTripDayByDay(to, unit) {
            const tripItins = itins.filter(i => i.to_no === to).sort((a,b) => new Date(a.travel_date) - new Date(b.travel_date));
            if (!tripItins.length) return alert("No itinerary dates found for this TO.");

            let receivedObj = {}, driverObj = {}, scheduleObj = {}, allLand = true;

            for (let i of tripItins) {
                const date = i.travel_date;
                const vSelect = document.getElementById(`v-${to}-${date}`);
                
                if (!vSelect || vSelect.value === "Select...") return alert(`Please assign a vehicle or set LAND for ${date}.`);
                
                const v = vSelect.value;
                const d = document.getElementById(`d-${to}-${date}`).value || "TBD";
                const s = document.getElementById(`s-${to}-${date}`).value || "WHOLE DAY";
                
                receivedObj[date] = v;
                driverObj[date] = v === 'LAND' ? 'N/A' : d;
                scheduleObj[date] = v === 'LAND' ? 'N/A' : s;

                if (v !== 'LAND') allLand = false;
            }

            const nextStatus = getApprovalTarget(unit);

            if (allLand) {
                const { error } = await db.from('travel_orders').update({ 
                    transport: 'LAND', received: null, driver: null, released: null, status: nextStatus 
                }).eq('to_no', to);
                if (error) alert("Database Error: " + error.message);
            } else {
                const { error } = await db.from('travel_orders').update({ 
                    received: JSON.stringify(receivedObj), 
                    driver: JSON.stringify(driverObj), 
                    released: JSON.stringify(scheduleObj),
                    status: nextStatus 
                }).eq('to_no', to);
                if (error) alert("Database Error: " + error.message);
            }
            sync();
        }

        async function toLand(to, unit) {
            if(!confirm("Are you sure you want to set the entire trip to LAND TRAVEL?")) return;
            await db.from('travel_orders').update({ transport: 'LAND', status: getApprovalTarget(unit), received: null, driver: null, released: null }).eq('to_no', to);
            sync();
        }

        // --- 2. DAILY RESERVATIONS (Grouped Simplification) ---
        function renderReservations() {
            const container = document.getElementById('main-content');
            const tos = orders.filter(x => x.transport === "GOV'T VEHICLE" && x.status !== 'PENDING_VEHICLE_APPROVER' && x.status !== 'OFF_ROAD');

            activeReservationGroups = {};
            const todayStr = new Date().toISOString().split('T')[0];

            // 1. Group TOs
            tos.forEach(to => {
                if (!activeReservationGroups[to.to_no]) {
                    activeReservationGroups[to.to_no] = { ref: to.to_no, type: 'TO', passengers: [], trips: [] };
                }
                if (!activeReservationGroups[to.to_no].passengers.find(p => p.name === to.emp_name)) {
                    activeReservationGroups[to.to_no].passengers.push({ name: to.emp_name, id: to.emp_id });
                }
            });

            // Populate Trips for TO Groups
            Object.keys(activeReservationGroups).forEach(ref => {
                if (activeReservationGroups[ref].type === 'TO') {
                    const toItins = itins.filter(i => i.to_no === ref).sort((a,b)=> new Date(a.travel_date) - new Date(b.travel_date));
                    const toRecord = tos.find(o => o.to_no === ref);
                    
                    toItins.forEach(itin => {
                        const date = itin.travel_date;
                        if (date < todayStr) return; // Only show incoming

                        const v = getDailyValue(toRecord.received, date, 'N/A');
                        const sStr = getDailyValue(toRecord.released, date, 'WHOLE DAY'); 
                        
                        // Hide completed trips checking vehicle_logs
                        if(vehLogs.some(vl => vl.to_no === ref && vl.travel_date === date && vl.action === 'COMPLETED')) return;

                        if (v && v !== 'LAND' && v !== 'N/A') {
                            activeReservationGroups[ref].trips.push({
                                date: date, dest: itin.destination, vehicle: v,
                                driver: getDailyValue(toRecord.driver, date, 'N/A'),
                                scheduleStr: sStr
                            });
                        }
                    });
                }
            });

            // 2. Group Bookings
            bookings.forEach(bk => {
                if(bk.schedule && bk.schedule.includes('[COMPLETED]')) return; // Hide completed
                if (bk.travel_date < todayStr) return; // Only show incoming
                
                if (!activeReservationGroups[bk.ref_no]) {
                    activeReservationGroups[bk.ref_no] = { ref: bk.ref_no, type: 'BK', passengers: [], trips: [] };
                }
                if (!activeReservationGroups[bk.ref_no].passengers.find(p => p.name === bk.emp_name)) {
                    activeReservationGroups[bk.ref_no].passengers.push({ name: bk.emp_name, id: bk.emp_id });
                }
                if (!activeReservationGroups[bk.ref_no].trips.find(t => t.date === bk.travel_date)) {
                    activeReservationGroups[bk.ref_no].trips.push({
                        date: bk.travel_date, dest: bk.destination, vehicle: bk.vehicle,
                        driver: bk.driver, scheduleStr: bk.schedule
                    });
                }
            });

            const groupsToRender = Object.values(activeReservationGroups).filter(g => g.trips.length > 0);

            if (groupsToRender.length === 0) { 
                container.innerHTML = `<div class="bg-white p-12 rounded-lg shadow-sm border border-gray-200 text-center"><span class="text-4xl text-gray-300">📋</span><p class="font-bold text-gray-400 mt-4 text-sm uppercase tracking-widest">No Active Reservations</p></div>`; 
                return; 
            }
            
            groupsToRender.sort((a,b) => new Date(a.trips[0].date) - new Date(b.trips[0].date));

            let html = `<div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 items-start">`;
            
            groupsToRender.forEach(group => {
                const borderTheme = group.type === 'TO' ? 'border-t-[#003811]' : 'border-t-[#D4AF37]';
                
                html += `
                <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 border-t-4 ${borderTheme} flex flex-col h-full">
                    <div class="flex justify-between items-center mb-3 pb-3 border-b border-gray-100">
                        <span class="text-xs font-bold text-gray-800 tracking-widest uppercase bg-gray-100 px-2.5 py-1 rounded shadow-sm">${group.type}: ${group.ref}</span>
                        <button onclick="openEditPass('${group.ref}', '${group.type}')" class="text-[10px] bg-[#003811] text-white hover:bg-green-800 px-3 py-1.5 rounded font-bold uppercase transition flex items-center gap-1">✎ Edit Passengers</button>
                    </div>
                    
                    <div class="mb-4">
                        <h3 class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-1.5">Manifest / Passengers</h3>
                        <div class="text-[11px] text-gray-700 font-bold leading-relaxed border-l-2 border-gray-200 pl-2">
                            ${group.passengers.map((p, i) => `${p.name} ${i===0?'<span class="bg-[#D4AF37] text-black text-[8px] px-1.5 py-0.5 rounded ml-1 tracking-wider shadow-sm">LEAD</span>':''}`).join('<br>')}
                        </div>
                    </div>
                    
                    <div class="flex-grow">
                        <h3 class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-1.5">Scheduled Trip Days</h3>
                        <div class="space-y-2">
                            ${group.trips.map(t => `
                                <div class="bg-gray-50 p-3 rounded border border-gray-200 flex justify-between items-center group">
                                    <div>
                                        <p class="text-xs font-bold text-[#003811] mb-0.5">${t.date}</p>
                                        <p class="text-[10px] font-semibold text-gray-600 uppercase flex items-center gap-1">🚙 ${t.vehicle} <span class="text-gray-400">|</span> 👤 ${t.driver}</p>
                                    </div>
                                    <div class="flex flex-col items-end gap-1.5">
                                        <span class="text-[9px] bg-white border border-gray-200 text-gray-700 px-2 py-0.5 rounded uppercase font-bold shadow-sm">${cleanText(t.scheduleStr)}</span>
                                        <div class="flex gap-1">
                                            <button onclick="openEditTrip('${group.ref}', '${t.date}', '${group.type}', '${escQ(t.vehicle)}', '${escQ(t.driver)}', '${escQ(cleanText(t.scheduleStr))}')" class="text-[9px] text-blue-600 font-bold hover:text-blue-800 hover:bg-blue-50 px-2 py-1 rounded transition opacity-70 group-hover:opacity-100 uppercase tracking-wide">Edit Vehicle</button>
                                            <button onclick="cancelDailyItem('${group.ref}', '${t.date}', '${group.type}')" class="text-[9px] text-red-500 font-bold hover:text-red-700 hover:bg-red-50 px-2 py-1 rounded transition opacity-70 group-hover:opacity-100 uppercase tracking-wide">Cancel Day</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            });
            
            html += `</div>`; container.innerHTML = html;
        }

        // --- Editing Trips/Vehicles ---
        function openEditTrip(ref, date, type, currVeh, currDr, currSch) {
            currentEditTrip = { ref, date, type };
            document.getElementById('editTripLabel').innerText = `${ref} - ${date}`;
            document.getElementById('editTripVeh').value = currVeh !== 'N/A' ? currVeh : 'MAZDA';
            document.getElementById('editTripDr').value = currDr !== 'N/A' ? currDr : 'Driver 1';
            document.getElementById('editTripSch').value = currSch;
            openModal('editTripModal');
        }

        async function saveEditTrip() {
            const { ref, date, type } = currentEditTrip;
            const v = document.getElementById('editTripVeh').value;
            const dr = document.getElementById('editTripDr').value;
            const sch = document.getElementById('editTripSch').value;

            if (type === 'TO') {
                const row = orders.find(o => o.to_no === ref);
                if (row) {
                    let recObj = {}, drvObj = {}, schObj = {};
                    
                    if(row.received && row.received.startsWith('{')) recObj = JSON.parse(row.received);
                    else if(row.received) recObj[date] = row.received;

                    if(row.driver && row.driver.startsWith('{')) drvObj = JSON.parse(row.driver);
                    else if(row.driver) drvObj[date] = row.driver;

                    if(row.released && row.released.startsWith('{')) schObj = JSON.parse(row.released);
                    else if(row.released) schObj[date] = row.released;

                    recObj[date] = v;
                    drvObj[date] = dr;
                    schObj[date] = sch;

                    const allLand = Object.values(recObj).every(val => val === 'LAND');
                    if (allLand) {
                        await db.from('travel_orders').update({ transport: 'LAND', received: null, driver: null, released: null }).eq('to_no', ref);
                    } else {
                        await db.from('travel_orders').update({
                            received: JSON.stringify(recObj),
                            driver: JSON.stringify(drvObj),
                            released: JSON.stringify(schObj)
                        }).eq('to_no', ref);
                    }
                }
            } else {
                await db.from('fleet_bookings').update({
                    vehicle: v,
                    driver: dr,
                    schedule: sch
                }).eq('ref_no', ref).eq('travel_date', date);
            }
            
            closeModal('editTripModal');
            sync();
        }

        // --- Transfer Passenger ---
        function openTransferModal(ref, date, type, currentVeh) {
            currentTransfer = { ref, date, type, currentVeh };
            document.getElementById('transferLabel').innerText = `${ref} - ${date} (${currentVeh})`;

            let passList = [];
            if (type === 'TO') {
                const tos = orders.filter(o => o.to_no === ref && getDailyValue(o.received, date, null) === currentVeh);
                passList = tos.map(o => ({ id: o.emp_id, name: o.emp_name }));
            } else {
                const bks = bookings.filter(b => b.ref_no === ref && b.travel_date === date && b.vehicle === currentVeh);
                passList = bks.map(b => ({ id: b.emp_id, name: b.emp_name }));
            }

            const sel = document.getElementById('transferPassSel');
            sel.innerHTML = passList.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

            document.getElementById('transferVehSel').value = currentVeh;
            openModal('transferModal');
        }

        async function saveTransfer() {
            const { ref, date, type, currentVeh } = currentTransfer;
            const empId = document.getElementById('transferPassSel').value;
            const newVeh = document.getElementById('transferVehSel').value;

            if (newVeh === currentVeh) return alert("Select a different vehicle.");

            if (type === 'TO') {
                const row = orders.find(o => o.to_no === ref && o.emp_id === empId);
                if (row) {
                    let recObj = {};
                    if(row.received && row.received.startsWith('{')) recObj = JSON.parse(row.received);
                    else if(row.received) recObj[date] = row.received;

                    recObj[date] = newVeh;

                    await db.from('travel_orders').update({
                        received: JSON.stringify(recObj)
                    }).eq('to_no', ref).eq('emp_id', empId);
                }
            } else {
                await db.from('fleet_bookings').update({
                    vehicle: newVeh
                }).eq('ref_no', ref).eq('travel_date', date).eq('emp_id', empId);
            }

            closeModal('transferModal');
            sync();
        }

        // --- Passenger Editing Functions ---
        function openEditPass(ref, type) {
            editPassRef = ref; editPassType = type;
            removedPassList = []; addedPassList = [];
            
            const group = activeReservationGroups[ref];
            currentPassList = group.passengers.map(p => ({ ...p, isNew: false }));
            
            renderEditPassList();
            openModal('editPassModal');
        }

        function renderEditPassList() {
            document.getElementById('editPassList').innerHTML = currentPassList.map((p, idx) => `
                <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded text-xs font-bold uppercase border border-gray-200">
                    <span class="${p.isNew ? 'text-green-700' : 'text-gray-700'}">${p.name} ${p.isNew ? '<span class="ml-1 text-[8px] bg-green-200 text-green-800 px-1 py-0.5 rounded">NEW</span>' : ''}</span>
                    <button onclick="removeEditPassenger(${idx})" class="text-red-500 hover:bg-red-100 rounded px-2 py-1 transition font-bold tracking-wide text-[10px]">REMOVE</button>
                </div>
            `).join('');
        }

        function queueEditPassenger() {
            if(!selectedEmpForAdd) return alert("Search and select an employee first.");
            // Prevent duplicates
            if(currentPassList.find(p => p.id === selectedEmpForAdd.id)) return alert("Employee is already in the manifest.");
            
            addedPassList.push(selectedEmpForAdd);
            currentPassList.push({ name: selectedEmpForAdd.n, id: selectedEmpForAdd.id, isNew: true });
            
            selectedEmpForAdd = null;
            document.getElementById('editPAdd').value = "";
            renderEditPassList();
        }

        function removeEditPassenger(idx) {
            const p = currentPassList[idx];
            if (!confirm(`Are you sure you want to remove ${p.name} from this dispatch?`)) return;
            
            if (!p.isNew) {
                removedPassList.push(p);
            } else {
                addedPassList = addedPassList.filter(a => a.id !== p.id);
            }
            
            currentPassList.splice(idx, 1);
            renderEditPassList();
        }

        async function saveEditPass() {
            // Apply deletions
            for (let p of removedPassList) {
                if (editPassType === 'TO') {
                    await db.from('travel_orders').update({ transport: 'LAND', received: null, driver: null }).eq('to_no', editPassRef).eq('emp_id', p.id);
                } else {
                    await db.from('fleet_bookings').delete().eq('ref_no', editPassRef).eq('emp_id', p.id);
                }
            }

            // Apply additions
            if (addedPassList.length > 0) {
                if (editPassType === 'TO') {
                    const baseTO = orders.find(o => o.to_no === editPassRef);
                    if (baseTO) {
                        for (let p of addedPassList) {
                            const newRow = { ...baseTO };
                            delete newRow.id; 
                            newRow.emp_name = p.n;
                            newRow.emp_id = p.id;
                            await db.from('travel_orders').insert(newRow);
                        }
                    }
                } else {
                    const baseBks = bookings.filter(b => b.ref_no === editPassRef);
                    const uniqueDates = [...new Set(baseBks.map(b => b.travel_date))];
                    const baseBk = baseBks[0];
                    
                    for (let p of addedPassList) {
                        for(let d of uniqueDates) {
                            const bkRow = baseBks.find(b => b.travel_date === d) || baseBk;
                            await db.from('fleet_bookings').insert({
                                ref_no: editPassRef, emp_name: p.n, emp_id: p.id,
                                travel_date: d, destination: bkRow.destination, purpose: bkRow.purpose,
                                vehicle: bkRow.vehicle, driver: bkRow.driver, schedule: bkRow.schedule
                            });
                        }
                    }
                }
            }
            
            closeModal('editPassModal');
            sync();
        }

        async function cancelDailyItem(ref, date, type) {
            if(!confirm(`Cancel vehicle dispatch for ${date}?`)) return;

            if (type === 'TO') {
                const { data } = await db.from('travel_orders').select('*').eq('to_no', ref).limit(1);
                if (data && data.length > 0) {
                    const row = data[0];
                    let recObj = {}, drvObj = {}, schObj = {};
                    if(row.received && row.received.startsWith('{')) recObj = JSON.parse(row.received);
                    if(row.driver && row.driver.startsWith('{')) drvObj = JSON.parse(row.driver);
                    if(row.released && row.released.startsWith('{')) schObj = JSON.parse(row.released);

                    recObj[date] = 'LAND';
                    drvObj[date] = 'N/A';
                    schObj[date] = 'N/A';

                    const allLand = Object.values(recObj).every(v => v === 'LAND');
                    if (allLand) {
                        await db.from('travel_orders').update({ transport: 'LAND', received: null, driver: null, released: null }).eq('to_no', ref);
                    } else {
                        await db.from('travel_orders').update({ received: JSON.stringify(recObj), driver: JSON.stringify(drvObj), released: JSON.stringify(schObj) }).eq('to_no', ref);
                    }
                }
            } else {
                await db.from('fleet_bookings').delete().eq('ref_no', ref).eq('travel_date', date);
            }
            sync();
        }

        async function markTripHappened(ref, type, date, passengerStr, scheduleStr) {
            if(!confirm("Mark this trip as HAPPENED? This will finalize it, hide it from the board, and move it to the Logs.")) return;
            
            const tag = '[COMPLETED]';
            
            // 1. Tag in bookings to hide it
            if (type === 'BK') {
                const bkList = bookings.filter(b => b.ref_no === ref && b.travel_date === date);
                if (bkList.length > 0) {
                    let baseText = cleanText(bkList[0].schedule || '');
                    await db.from('fleet_bookings').update({ schedule: `${tag} ${baseText}` }).eq('ref_no', ref).eq('travel_date', date);
                }
            }

            // 2. Insert to vehicle_logs to record the specific schedule block and hide TOs
            await db.from('vehicle_logs').insert({
                to_no: ref,
                applicant: passengerStr,
                travel_date: date,
                action: 'COMPLETED',
                schedule: cleanText(scheduleStr) // Writes schedule directly to vehicle_logs where the column lives
            });

            sync();
        }

        async function isDoubleBooked(empName, checkDates) {
            const empTrips = orders.filter(o => o.emp_name === empName && o.status !== 'CANCELLED' && o.transport === "GOV'T VEHICLE");
            for (let trip of empTrips) {
                const tripDates = itins.filter(i => i.to_no === trip.to_no).map(i => i.travel_date);
                if(tripDates.some(d => checkDates.includes(d))) return true;
            }
            const bks = bookings.filter(b => b.emp_name === empName && checkDates.includes(b.travel_date));
            return bks.length > 0;
        }

        function runEmpSearch(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase().trim();
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => `<div onclick="pickPersonnel('${safeStr(e.full_name)}','${resId}','${inp.id}','${safeStr(e.emp_id)}')" class="p-4 border-b border-gray-100 text-sm font-bold active:bg-gray-100 cursor-pointer uppercase text-gray-700 hover:bg-gray-50 transition">${e.full_name}</div>`).join('');
            div.classList.remove('hidden');
        }

        function pickPersonnel(n, rId, iId, eId) {
            document.getElementById(iId).value = n;
            document.getElementById(rId).classList.add('hidden');
            selectedEmpForAdd = { n, id: eId };
        }

        function queuePassenger() {
            if(!selectedEmpForAdd) return alert("Search and click a name first.");
            manualPassengerQueue.push(selectedEmpForAdd);
            document.getElementById('resPAdd').value = "";
            selectedEmpForAdd = null;
            renderManualPList();
        }

        function renderManualPList() {
            document.getElementById('manualPList').innerHTML = manualPassengerQueue.map((p, idx) => `
                <div class="flex justify-between items-center bg-white p-3 rounded text-xs font-bold uppercase border ${idx===0 ? 'border-[#003811] shadow-sm' : 'border-gray-200'}">
                    <span>${p.n} ${idx===0 ? '<span class="ml-2 bg-[#003811] text-white text-[10px] px-2 py-1 rounded">LEAD</span>' : ''}</span>
                    <button onclick="manualPassengerQueue.splice(${idx},1);renderManualPList();" class="text-red-500 font-bold hover:scale-110 px-2 transition">✕</button>
                </div>`).join('');
        }

        async function saveManual() {
            const d1 = document.getElementById('resD1').value, d2 = document.getElementById('resD2').value;
            const assign = document.getElementById('resS').value, v = document.getElementById('resV').value, dr = document.getElementById('resDr').value;
            const dest = document.getElementById('resDest').value.trim(), p = document.getElementById('resP').value.trim();
            const depT = document.getElementById('resDepTime').value, arrT = document.getElementById('resArrTime').value;
            
            if(!d1 || !dest || !p) return alert("Missing Start Date, Destination, or Purpose.");
            if(manualPassengerQueue.length === 0) return alert("Please queue at least one passenger.");

            let st = new Date(d1), en = new Date(d2 || d1), dates = [];
            while(st <= en) { dates.push(st.toISOString().split('T')[0]); st.setDate(st.getDate() + 1); }

            for (let pass of manualPassengerQueue) {
                if (await isDoubleBooked(pass.n, dates)) return alert(`Blocked: ${pass.n} is already assigned a vehicle on these dates!`);
            }

            let timeStr = assign;
            if (depT && arrT) timeStr = `${assign} (${formatTo12Hour(depT)} - ${formatTo12Hour(arrT)})`;
            else if (depT) timeStr = `${assign} (${formatTo12Hour(depT)} Onward)`;

            const fleetPayload = [];
            const toUpdates = []; 
            const ref = `BK-${Math.floor(Date.now()%100000)}`;

            for (let pass of manualPassengerQueue) {
                const passTOs = orders.filter(o => o.emp_name === pass.n && o.status !== 'CANCELLED' && (o.transport !== "GOV'T VEHICLE" || !o.transport));
                
                let matchedTO = null;
                for (let to of passTOs) {
                    const toDates = itins.filter(i => i.to_no === to.to_no).map(i => i.travel_date);
                    if (toDates.some(d => dates.includes(d))) { matchedTO = to.to_no; break; }
                }

                if (matchedTO) toUpdates.push(matchedTO);
                else {
                    for (let date of dates) {
                        fleetPayload.push({ ref_no: ref, emp_name: pass.n, emp_id: pass.id, travel_date: date, destination: dest, purpose: p, vehicle: v, driver: dr, schedule: timeStr });
                    }
                }
            }

            if (fleetPayload.length > 0) await db.from('fleet_bookings').insert(fleetPayload);
            
            for (let to of [...new Set(toUpdates)]) {
                const toRec = orders.find(x => x.to_no === to);

                // For TOs mapped to a manual booking, we DO NOT write a schedule object to travel_orders to avoid schema errors.
                await db.from('travel_orders').update({ transport: "GOV'T VEHICLE", received: v, driver: dr, status: getApprovalTarget(toRec.unit) }).eq('to_no', to);
            }
            
            manualPassengerQueue = []; document.getElementById('resDest').value = ""; document.getElementById('resP').value = "";
            renderManualPList(); closeModal('bookModal'); sync();
        }

        function switchTab(t) { currentTab = t; renderDashboardLayout(); }
        function setFilter(f) { scheduleFilter = f; renderSchedule(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function safeStr(str) { return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
        
        function setOffRoad(veh) { activeVehForMaint = veh; document.getElementById('maintSub').innerText = `Vehicle: ${veh}`; document.getElementById('maintD1').value = ""; document.getElementById('maintD2').value = ""; document.getElementById('maintReason').value = ""; openModal('maintModal'); }
        
        async function saveMaintenance() { const d1 = document.getElementById('maintD1').value, d2 = document.getElementById('maintD2').value, reason = document.getElementById('maintReason').value || "Routine Maintenance"; if(!d1) return alert("Select at least a start date."); const to = `MAINT-${Math.floor(Date.now()%10000)}`; await db.from('travel_orders').insert({ to_no: to, emp_name: '🚨 UNAVAILABLE', received: activeVehForMaint, status: 'OFF_ROAD', transport: "GOV'T VEHICLE" }); let st = new Date(d1), en = new Date(d2 || d1); while(st <= en) { await db.from('itinerary').insert({ to_no: to, travel_date: st.toISOString().split('T')[0], destination: "Authorized Shop", purpose: reason }); st.setDate(st.getDate() + 1); } closeModal('maintModal'); sync(); }
        async function endMaintenance(to) { if(!confirm("Maintenance finished? This clears remaining schedules.")) return; const now = new Date(); const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0'); await db.from('itinerary').delete().eq('to_no', to).gte('travel_date', `${y}-${m}-${d}`); const remaining = await db.from('itinerary').select('id').eq('to_no', to); if(!remaining.data || remaining.data.length === 0) await db.from('travel_orders').delete().eq('to_no', to); sync(); }

        // --- FLEET ISSUES ---
        function openLogIssue(veh) {
            activeVehForMaint = veh;
            document.getElementById('issueVehName').innerText = `Vehicle: ${veh}`;
            document.getElementById('issueDesc').value = '';
            openModal('issueModal');
        }

        async function saveIssue() {
            const desc = document.getElementById('issueDesc').value.trim();
            if(!desc) return alert("Please detail the issue.");
            
            const today = new Date().toISOString().split('T')[0];
            
            await db.from('vehicle_logs').insert({
                to_no: 'FLEET-ISSUE',
                applicant: activeVehForMaint,
                travel_date: today,
                action: 'ISSUE: ' + desc,
                schedule: 'N/A'
            });
            
            closeModal('issueModal');
            sync();
        }
    </script>
</body>
