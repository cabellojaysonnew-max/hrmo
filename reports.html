<body class="flex h-screen overflow-hidden">

    <nav class="bg-[#003811] md:w-64 flex flex-col text-white flex-shrink-0 shadow-xl z-20">
        <div class="p-6 hidden md:block border-b border-[#006400]">
            <h2 class="text-xl font-bold text-[#D4AF37]">DAR HR</h2>
        </div>
        <div class="flex-1 overflow-y-auto py-2">
            <a href="dashboard.html" class="block w-full text-left px-6 py-4 text-sm font-bold border-l-4 border-transparent hover:bg-[#006400]">DASHBOARD</a>
            <a href="pds.html" class="block w-full text-left px-6 py-4 text-sm font-bold border-l-4 border-transparent hover:bg-[#006400]">PDS MANAGER</a>

    <main class="flex-1 overflow-y-auto p-8">

        <div class="card p-6 border-[#E5E7EB] shadow-sm mb-6 max-w-5xl">

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-end">
                <div>
                    <label class="form-label text-[9px] font-bold">Report Type:</label>

                        <option>Tardiness / Undertime</option>
                        <option>PSO / TO Conflicts</option>
                        <option>Tardiness Memos</option>

                </div>
                
                <div>
                    <label class="form-label text-[9px] font-bold">Select Period:</label>
                    <select id="repPeriod" class="form-input bg-[#F9FAFB] border-[#D1D5DB] text-sm" onchange="toggleReportPeriod()">
                        <option>WEEKLY</option>

                <div id="repMonthGroup">

                    </div>

                        <label class="text-[8px]">Append Level:</label>

                            <option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option><option value="4">Level 4</option>
                        </select>

            <button onclick="generatePDFReport()" id="btnGenerateReport" class="mt-8 bg-[#D4AF37] text-[#003811] font-bold text-sm px-8 py-3 rounded shadow hover:brightness-110 w-full md:w-auto">GENERATE PDF REPORT</button>
            <span id="loadingStatus" class="ml-4 text-sm font-bold text-red-700 hidden">Fetching Data... Please wait.</span>
        </div>
    </main>

<script>
    // --- SESSION AUTH ---
    const userData = sessionStorage.getItem('currentUser');
    if (!userData) window.location.href = 'index.html';
    const currentUser = JSON.parse(userData);
    if (!currentUser.role.toUpperCase().includes('HR') && !currentUser.role.toUpperCase().includes('ADMIN')) {
        alert("Unauthorized Access. HRMO personnel only.");
        window.location.href = 'dashboard.html';
    }
    document.getElementById('activeUser').innerText = `User: ${currentUser.full_name.toUpperCase()}`;

    function logout() {
        sessionStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }

    // --- INITIALIZATION ---
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    window.onload = () => {
        let mSel = document.getElementById('repMonth');
        months.forEach((m, i) => mSel.add(new Option(m, i + 1)));
        const now = new Date();
        mSel.selectedIndex = now.getMonth();
        document.getElementById('repYear').value = now.getFullYear();
    };

    function toggleReportPeriod() {
        const p = document.getElementById('repPeriod').value;
        document.getElementById('repMonthGroup').style.opacity = (p === 'MONTHLY' || p === 'ANNUALLY') ? '1' : '0.5';
        document.getElementById('repMonth').disabled = (p !== 'MONTHLY');
        document.getElementById('repYear').disabled = (p !== 'MONTHLY' && p !== 'ANNUALLY');
    }

    // --- HELPERS ---
    function cleanId(val) { return val ? String(val).split('.')[0].trim() : ""; }

    function format12h(timeStr) {
        if (!timeStr || timeStr === 'None' || timeStr === 'nan' || timeStr === '-') return "-";
        try {
            const [h, m] = timeStr.split(':');
            let hr = parseInt(h, 10);
            const ampm = hr >= 12 ? 'PM' : 'AM';
            hr = hr % 12 || 12;
            return `${hr.toString().padStart(2, '0')}:${m} ${ampm}`;
        } catch(e) { return timeStr; }
    }

    async function getAssetBase64(filename) {
        if (!filename) return null;
        try {
            const { data } = await supabaseClient.storage.from('e-sign').download(filename);
            if (!data) return null;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(data);
            });
        } catch(e) { return null; }
    }

    async function getQRBase64(text) {
        return new Promise((resolve) => {
            const container = document.createElement('div');
            new QRCode(container, { text: text, width: 120, height: 120, correctLevel: QRCode.CorrectLevel.L });
            setTimeout(() => { resolve(container.querySelector("canvas").toDataURL("image/png")); }, 150);
        });
    }

    // Ported FPDF Draw Table Group Logic
    function drawTableGroup(doc, divisionName, groupData, headers, widths, rowFormatter, isAppend, appendLvl, startY) {
        let cy = startY;
        const margin = 15;

        // Group Header
        doc.setFillColor(200, 220, 255);
        doc.setFont("helvetica", "bold"); doc.setFontSize(10);
        doc.rect(margin, cy, widths.reduce((a,b)=>a+b, 0), 8, 'FD');
        doc.text(`DIVISION: ${divisionName}`, margin + 2, cy + 5.5);
        cy += 8;

        // Column Headers
        doc.setFillColor(220, 220, 220);
        doc.setFontSize(8);
        let cx = margin;
        headers.forEach((h, i) => {
            doc.rect(cx, cy, widths[i], 8, 'FD');
            doc.text(h, cx + (widths[i]/2), cy + 5, {align: 'center'});
            cx += widths[i];
        });
        cy += 8;

        // Rows
        doc.setFont("helvetica", "normal"); doc.setFontSize(7);
        groupData.forEach(row => {
            if (cy > 185 && !isAppend) { 
                doc.addPage(); 
                cy = 20; 
                doc.setFontSize(7); 
            }
            cx = margin;
            
            let rowData = rowFormatter(row);
            let maxLines = 1;
            rowData.forEach((val, i) => {
                let vStr = (val !== null && val !== undefined && val !== "") ? String(val) : "-";
                if (["RECEIVED", "SIGNATURE"].includes(headers[i])) vStr = "";
                let lines = doc.splitTextToSize(vStr, widths[i] - 2);
                if (lines.length > maxLines) maxLines = lines.length;
            });
            
            let rowH = Math.max(6, maxLines * 4 + 2);

            rowData.forEach((val, i) => {
                let vStr = (val !== null && val !== undefined && val !== "") ? String(val) : "-";
                if (["RECEIVED", "SIGNATURE", "DATE"].includes(headers[i])) vStr = "";
                
                doc.setFillColor(255, 255, 255);
                doc.rect(cx, cy, widths[i], rowH, 'FD');
                
                let align = 'center';
                if (["PURPOSE", "DESTINATION", "NAME", "NAME OF EMPLOYEE", "INCLUSIVE DATES", "DATE/S", "DATES & EXACT TIME IN", "DETAILS (DATE: STATUS [TIME IN])", "REPORT TO"].includes(headers[i])) align = 'left';
                
                const tx = align === 'center' ? cx + (widths[i]/2) : cx + 2;
                let textLines = doc.splitTextToSize(vStr, widths[i] - 2);
                doc.text(textLines, tx, cy + 4, {align: align});
                cx += widths[i];
            });
            cy += rowH;
        });
        return cy + 5;
    }

    async function getLeaveBalances(emp_id, llData, empData) {
        let balances = {'VL': 0.0, 'SL': 0.0, 'SPL': 0.0, 'WL': 0.0, 'FL': 0.0, 'CTO': 0.0};
        const cleanEid = cleanId(emp_id);
        const e = empData.find(x => cleanId(x.emp_id) === cleanEid);
        
        if (e) {
            balances['VL'] = parseFloat(e.vl_balance) || 0; balances['SL'] = parseFloat(e.sl_balance) || 0;
            balances['SPL'] = parseFloat(e.spl_balance) || 0; balances['WL'] = parseFloat(e.wl_balance) || 0;
            balances['CTO'] = parseFloat(e.cto_balance) || 0; balances['FL'] = parseFloat(e.fl_balance) || 0;
        }

        const eLedger = llData.filter(l => cleanId(l.emp_id) === cleanEid);
        eLedger.forEach(r => {
            const transType = String(r.transaction_type || r.transaction_t || '').toUpperCase();
            let isDeduc = transType.includes('APPROVED') || transType.includes('PROCESSED') || transType.includes('DEDUCTION') || transType.includes('UNDERTIME') || transType.includes('GATE_PASS') || transType.includes('TARDINESS');
            let isCred = transType.includes('CREDIT');
            if (!isDeduc && !isCred) return;

            let lType = String(r.type || '').toUpperCase().trim();
            if(lType.includes('VACATION') || transType.includes('TARDINESS') || transType.includes('GATE') || transType.includes('UNDERTIME')) lType = 'VL';
            else if(lType.includes('SICK')) lType = 'SL';
            else if(lType.includes('PRIVILEGE')) lType = 'SPL';
            else if(lType.includes('WELLNESS')) lType = 'WL';
            else if(lType.includes('FORCED')) lType = 'FL';
            else if(lType.includes('COMPENSATORY')) lType = 'CTO';

            if (!(lType in balances)) balances[lType] = 0;
            balances[lType] += parseFloat(r.credit || 0);
            if (isDeduc) balances[lType] -= Math.abs(parseFloat(r.debit || 0));
        });
        return balances;
    }

    // --- MAIN EXECUTOR ---
    async function generatePDFReport() {
        const repType = document.getElementById('repType').value;
        const period = document.getElementById('repPeriod').value;
        const btn = document.getElementById('btnGenerateReport');
        const statusLbl = document.getElementById('loadingStatus');

        btn.disabled = true; statusLbl.style.display = 'inline';
        
        const now = new Date();
        let startDt, endDt, titleSuffix;

        if (period === 'MONTHLY') {
            const y = parseInt(document.getElementById('repYear').value);
            const m = parseInt(document.getElementById('repMonth').value);
            startDt = new Date(y, m - 1, 1);
            endDt = new Date(y, m, 0, 23, 59, 59);
            titleSuffix = `${months[m-1].toUpperCase()} ${y}`;
        } else if (period === 'ANNUALLY') {
            const y = parseInt(document.getElementById('repYear').value);
            startDt = new Date(y, 0, 1);
            endDt = new Date(y, 11, 31, 23, 59, 59);
            titleSuffix = `YEAR ${y}`;
        } else if (period === 'RANGE') {
            const startStr = prompt("Enter Start Date (YYYY-MM-DD):");
            const endStr = prompt("Enter End Date (YYYY-MM-DD):");
            if (!startStr || !endStr) { btn.disabled = false; statusLbl.style.display = 'none'; return; }
            startDt = new Date(startStr); endDt = new Date(endStr); endDt.setHours(23, 59, 59);
            titleSuffix = `${startStr} to ${endStr}`;
        } else { // WEEKLY
            endDt = new Date(); startDt = new Date(); startDt.setDate(endDt.getDate() - 7);
            titleSuffix = "LAST 7 DAYS";
        }

        const startIso = startDt.toISOString();
        const endIso = endDt.toISOString();
        const { jsPDF } = window.jspdf;

        try {
            // Pre-fetch Base Entities
            const { data: empData } = await supabaseClient.from('employees').select('*');
            if (!empData || !empData.length) throw new Error("Employee DB is empty.");
            
            const { data: userData } = await supabaseClient.from('users').select('*');
            
            const nameMap = {}, divMap = {}, posMap = {}, stationMap = {};
            empData.forEach(e => {
                const id = cleanId(e.emp_id);
                nameMap[id] = e.full_name; divMap[id] = e.division; posMap[id] = e.position; stationMap[id] = e.station;
            });

            // 1. TRAVEL ORDER BATCH PRINTING
            if (repType === "Travel Order Batch Printing") {
                const { data: toData } = await supabaseClient.from('travel_orders').select('*').eq('status', 'APPROVED');
                const { data: itinData } = await supabaseClient.from('itinerary').select('*').gte('travel_date', startIso.split('T')[0]).lte('travel_date', endIso.split('T')[0]);
                
                if (!toData || !itinData || !itinData.length) throw new Error("No Approved Travel Orders found for this period.");

                const activeToNos = [...new Set(itinData.map(i => i.to_no))];
                const activeTOs = toData.filter(t => activeToNos.includes(t.to_no));
                if (!activeTOs.length) throw new Error("No matching TOs found.");

                const bgForm = await getAssetBase64('bg_form.jpg');
                const p2 = await getAssetBase64('p2.png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                let isFirst = true;

                for (let t of activeTOs) {
                    const toItins = itinData.filter(i => i.to_no === t.to_no).sort((a,b) => new Date(a.travel_date) - new Date(b.travel_date));
                    const uHead = String(t.unithead_signed || '').toUpperCase();
                    const dc = String(t.dc_signed || '').toUpperCase();
                    
                    const uEmp = empData.find(e => String(e.full_name).toUpperCase() === uHead);
                    const dEmp = empData.find(e => String(e.full_name).toUpperCase() === dc);
                    
                    const uSign = uEmp ? await getAssetBase64(`${uEmp.emp_id}.png`) : null;
                    const dSign = dEmp ? await getAssetBase64(`${dEmp.emp_id}.png`) : null;
                    const qr = await getQRBase64(t.to_no);

                    if (!isFirst) pdf.addPage();
                    isFirst = false;

                    if (bgForm) pdf.addImage(bgForm, 'JPEG', 0, 0, 210, 297);
                    
                    pdf.setFont("helvetica", "bold"); pdf.setFontSize(10); pdf.setTextColor(255, 0, 0);
                    let wy = 10;
                    if (String(t.remarks).includes("OVERRIDE")) { pdf.text("WITH EXISTING PSO/RSO, subject for PARPO's FINAL APPROVAL", 60, wy); wy += 5; }
                    if (String(t.transport).toUpperCase().includes("GOV'T")) pdf.text("NOT VALID FOR TRANSPORTATION REIMBURSEMENT CLAIM", 60, wy);
                    
                    pdf.setTextColor(0, 0, 0); pdf.setFont("helvetica", "italic"); pdf.setFontSize(7);
                    pdf.text("HR FILE COPY", 175, 5, {align: 'center'});
                    if(qr) pdf.addImage(qr, 'PNG', 175, 10, 25, 25);
                    
                    pdf.setFont("helvetica", "bold"); pdf.setFontSize(17);
                    pdf.text(`TRAVEL ORDER NO. ${t.to_no}`, 105, 40, {align: 'center'});
                    pdf.setFont("helvetica", "normal"); pdf.setFontSize(11);
                    pdf.text(`Date: ${new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}`, 200, 46, {align: 'right'});

                    pdf.setFont("helvetica", "bold"); pdf.text("NAME: ", 10, 56); pdf.line(25, 57, 200, 57);
                    pdf.setFont("helvetica", "normal"); pdf.text(String(t.emp_name).toUpperCase(), 25, 56);

                    pdf.setFont("helvetica", "bold"); pdf.setFontSize(10);
                    pdf.text("POSITION: ", 10, 62); pdf.line(32, 63, 100, 63); pdf.setFont("helvetica", "normal"); pdf.text(posMap[cleanId(t.emp_id)]||'', 32, 62);
                    pdf.setFont("helvetica", "bold"); pdf.text("STATION: ", 105, 62); pdf.line(125, 63, 200, 63); pdf.setFont("helvetica", "normal"); pdf.text(stationMap[cleanId(t.emp_id)]||'', 125, 62);

                    pdf.setFont("helvetica", "bold"); pdf.text("MEANS OF TRANSPORTATION:", 10, 72);
                    const trans = String(t.transport).toUpperCase();
                    const chk = (lbl, x, y, c) => { pdf.rect(x, y-3, 3, 3); if(c) { pdf.setFont("helvetica", "bold"); pdf.text("X", x+0.5, y-0.5); pdf.setFont("helvetica", "normal"); } pdf.text(lbl, x+5, y); };
                    pdf.setFont("helvetica", "normal"); pdf.setFontSize(9);
                    chk("AIR", 15, 77, trans.includes("AIR")); chk("GOV'T VEHICLE", 70, 77, trans.includes("GOV'T"));
                    chk("LAND", 15, 82, trans.includes("LAND")); chk("OTHERS, PLEASE SPECIFY", 70, 82, trans.includes("OTHERS"));

                    pdf.setFont("helvetica", "bold"); pdf.setFontSize(10); pdf.text("DESTINATION:", 10, 92);
                    pdf.setFont("helvetica", "normal");
                    const dests = toItins.map(i => `${i.destination} - ${new Date(i.travel_date).toLocaleDateString('en-US', {month:'long', day:'numeric'})}`).join(", ");
                    const destSplit = pdf.splitTextToSize(dests, 160);
                    pdf.text(destSplit, 40, 92); pdf.line(40, 93 + (destSplit.length-1)*5, 200, 93 + (destSplit.length-1)*5);

                    const ny = 102 + (destSplit.length-1)*5;
                    pdf.setFont("helvetica", "bold"); pdf.text("DEPARTURE DATE:", 10, ny); pdf.setFont("helvetica", "normal"); pdf.text(toItins[0].travel_date, 50, ny); pdf.line(48, ny+1, 85, ny+1);
                    pdf.setFont("helvetica", "bold"); pdf.text("   RETURN DATE:", 90, ny); pdf.setFont("helvetica", "normal"); pdf.text(toItins[toItins.length-1].travel_date, 125, ny); pdf.line(125, ny+1, 160, ny+1);

                    pdf.setFont("helvetica", "bold"); pdf.text("REPORT TO:", 10, ny+8); pdf.setFont("helvetica", "normal"); pdf.text(t.report_to||'', 35, ny+8); pdf.line(35, ny+9, 200, ny+9);
                    
                    pdf.setFont("helvetica", "bold"); pdf.text("PURPOSE OF TRAVEL:", 10, ny+16); pdf.setFont("helvetica", "normal");
                    const purpSplit = pdf.splitTextToSize(toItins[0].purpose||'', 190);
                    pdf.text(purpSplit, 10, ny+22); pdf.line(10, ny+23+(purpSplit.length-1)*5, 200, ny+23+(purpSplit.length-1)*5);

                    const by = ny + 30 + (purpSplit.length-1)*5;
                    pdf.setFont("helvetica", "italic"); pdf.setFontSize(9); pdf.text("In case of seminar/workshop/consultation/briefing, indicate:", 10, by);
                    const isLI = String(toItins[0].purpose).toUpperCase().includes("LIVE IN");
                    const isLO = String(toItins[0].purpose).toUpperCase().includes("LIVE OUT");
                    pdf.setFont("helvetica", "normal");
                    chk("LIVE IN", 15, by+5, isLI); chk("LIVE OUT", 40, by+5, isLO);

                    pdf.setFont("helvetica", "bold"); pdf.setFontSize(10); pdf.text("Recommended by:", 10, 160);
                    let sy = 175;
                    if(uSign) { try{ pdf.addImage(uSign, 'PNG', 35, sy-15, 35, 25); }catch(e){} }
                    pdf.text(uHead || "_______________________", 50, sy, {align: 'center'}); pdf.line(20, sy+2, 80, sy+2);
                    pdf.setFont("helvetica", "normal"); pdf.setFontSize(9); pdf.text("UNIT HEAD", 50, sy+6, {align: 'center'});

                    pdf.setFont("helvetica", "bold"); pdf.setFontSize(10);
                    if(dSign) { try{ pdf.addImage(dSign, 'PNG', 115, sy-20, 35, 25); }catch(e){} }
                    pdf.text(dc || "_______________________", 130, sy, {align: 'center'}); pdf.line(100, sy+2, 160, sy+2);
                    pdf.setFont("helvetica", "normal"); pdf.setFontSize(9); pdf.text("DIVISION CHIEF", 130, sy+6, {align: 'center'});

                    sy += 25;
                    if(p2) { try{ pdf.addImage(p2, 'PNG', 115, sy-15, 30, 25); }catch(e){} }
                    pdf.setFont("helvetica", "bold"); pdf.setFontSize(11); pdf.text("RICARDO C. GARCIA", 130, sy, {align: 'center'});
                    pdf.setFont("helvetica", "normal"); pdf.setFontSize(10); pdf.text("PARPO II", 130, sy+5, {align: 'center'});
                }
                pdf.save(`Batch_HR_Files_TravelOrders_${titleSuffix.replace(/ /g, '_')}.pdf`);
            }

            // 2. COMPLIANCE MEMOS
            else if (repType === "Compliance Memos") {
                const y2 = parseInt(document.getElementById('reportYear').value);
                const { data: compData } = await supabaseClient.from('annual_compliance').select('*').eq('year', y2);
                
                const pdf = new jsPDF('p', 'mm', [215.9, 330.2]); // Legal
                const bgMemo = await getAssetBase64('bg_memo.jpg');
                const todayStr = new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
                let memosGen = 0;

                for (let e of empData) {
                    const eid = cleanId(e.emp_id);
                    const ec = (compData || []).find(c => cleanId(c.emp_id) === eid);
                    
                    let missing = [];
                    if (!ec) { missing = ["Statement of Assets, Liabilities, and Net Worth (SALN)", "IPCR Plan", "IPCR", "Leave Administration Plan (LAP)", "HMO Plan submission"]; }

                pdf = new jsPDF('l', 'mm', 'a4');
                let startY = initHeaderLandscape();

                if (repType === "Travel Order Summary") {
                    const { data: toData } = await supabaseClient.from('travel_orders').select('*').eq('status', 'APPROVED');
                    const { data: itinData } = await supabaseClient.from('itinerary').select('*').gte('travel_date', startIso.split('T')[0]).lte('travel_date', endIso.split('T')[0]);
                    if (!toData || !itinData || !itinData.length) throw new Error("No TO data for this period.");

                    const validToNos = new Set(toData.map(t=>t.to_no));
                    const activeItins = itinData.filter(i => validToNos.has(i.to_no));

                    const sumObj = {};
                    activeItins.forEach(i => {
                        const to = toData.find(t => t.to_no === i.to_no);
                        const eid = cleanId(to.emp_id);
                        const key = `${i.to_no}_${eid}`;
                        if (!sumObj[key]) sumObj[key] = { to_no: i.to_no, emp_id: eid, name: nameMap[eid] || 'Unknown', div: divMap[eid] || 'UNASSIGNED', dates: [], dests: new Set(), purps: new Set() };
                        sumObj[key].dates.push(i.travel_date); sumObj[key].dests.add(i.destination); sumObj[key].purps.add(i.purpose);
                    });

                    const dGrps = {};
                    Object.values(sumObj).forEach(r => {
                        if(!dGrps[r.div]) dGrps[r.div] = [];
                        r.dates.sort();
                        let dStr = r.dates[0]; if (r.dates.length > 1) dStr += ` to ${r.dates[r.dates.length-1]}`;
                        dGrps[r.div].push([r.to_no, r.name, dStr, Array.from(r.dests).join('; '), Array.from(r.purps).join('; '), '', '']);
                    });

                    const h = ["TO NUMBER", "NAME OF EMPLOYEE", "INCLUSIVE DATES", "DESTINATION", "PURPOSE", "RECEIVED", "SIGNATURE"];
                    const w = [30, 45, 60, 45, 50, 20, 27];
                    for (const div in dGrps) startY = drawTableGroup(pdf, div, dGrps[div], h, w, x=>x, isAppend, appendLvl, startY);
                }

                else if (repType === "Gate Pass") {
                    const { data: gpData } = await supabaseClient.from('gate_pass_logs').select('*').gte('date', startIso.split('T')[0]).lte('date', endIso.split('T')[0]).eq('status', 'PROCESSED');
                    if (!gpData || !gpData.length) throw new Error("No PROCESSED data available for Gate Pass.");

                    const dGrps = {};
                    gpData.forEach(g => {
                        const eid = cleanId(g.emp_id);
                        const div = divMap[eid] || 'UNASSIGNED';
                        if(!dGrps[div]) dGrps[div] = [];

                        let dest = "-", purp = g.purpose || "-";
                        if (purp.includes(" - ")) [dest, purp] = purp.split(" - ");
                        
                        let hr = "0", mn = "0";
                        if (g.time_out && g.time_in) {
                            const o = new Date(`1970-01-01T${g.time_out}`); const i = new Date(`1970-01-01T${g.time_in}`);
                            const m = (i - o) / 60000;
                            if (m > 0) { hr = Math.floor(m/60).toString(); mn = (m%60).toString(); }
                        }
                        dGrps[div].push([g.id, nameMap[eid] || 'Unknown', g.pass_type || '-', dest, purp, format12h(g.time_out), format12h(g.time_in), hr, mn, parseFloat(g.deduction_credit || 0).toFixed(3)]);
                    });

                    const h = ["CTRL NO", "NAME OF EMPLOYEE", "TYPE", "DESTINATION", "PURPOSE", "DEPARTURE", "ARRIVAL", "HOURS", "MINUTES", "CREDIT VL"];
                    const w = [20, 50, 20, 40, 65, 25, 25, 20, 20, 25];
                    for (const div in dGrps) startY = drawTableGroup(pdf, div, dGrps[div], h, w, x=>x, isAppend, appendLvl, startY);
                }

                else if (repType === "Leave Summary") {
                    const { data: llData } = await supabaseClient.from('leave_ledger').select('*').in('transaction_t', ['APPROVED', 'PROCESSED']).gte('date', startIso.split('T')[0]).lte('date', endIso.split('T')[0]);
                    if (!llData || !llData.length) throw new Error("No Leave Summary data for this period.");

                    const sObj = {};
                    llData.forEach(l => {
                        const eid = cleanId(l.emp_id);
                        let lt = String(l.type).toUpperCase();
                        if (lt.includes('VACATION')) lt = 'VL'; else if (lt.includes('SICK')) lt = 'SL'; else if (lt.includes('PRIVILEGE')) lt = 'SPL'; else if (lt.includes('WELLNESS')) lt = 'WL'; else if (lt.includes('FORCED')) lt = 'FL'; else if (lt.includes('COMPENSATORY')) lt = 'CTO';
                        const key = `${eid}_${lt}_${l.remarks}`;
                        if (!sObj[key]) sObj[key] = { eid, name: nameMap[eid], div: divMap[eid] || 'UNASSIGNED', type: lt, dates: [], totalDays: 0 };
                        sObj[key].dates.push(l.date || l.start_date);
                        sObj[key].totalDays += Math.abs(parseFloat(l.debit || 0));
                    });

                    const dGrps = {};
                    for (const r of Object.values(sObj)) {
                        if(!dGrps[r.div]) dGrps[r.div] = [];
                        r.dates.sort();
                        let dStr = r.dates[0]; if (r.dates.length > 1) dStr += ` to ${r.dates[r.dates.length-1]}`;
                        
                        // Async balance calculation needs sequential push mapping
                        const bal = await getLeaveBalances(r.eid, llData, empData);
                        dGrps[r.div].push([r.eid, r.name, r.type, dStr, r.totalDays.toFixed(2), bal[r.type] ? bal[r.type].toFixed(2) : '0.00']);
                    }

                    const h = ["EMP NUMBER", "NAME", "LEAVE TYPE", "INCLUSIVE DATES", "TOTAL DAYS", "AVAILABLE BALANCE"];
                    const w = [30, 70, 30, 85, 45, 50];
                    for (const div in dGrps) startY = drawTableGroup(pdf, div, dGrps[div], h, w, x=>x, isAppend, appendLvl, startY);
                }

                else if (repType === "Tardiness / Undertime") {
                    const { data: llData } = await supabaseClient.from('leave_ledger').select('*').gte('date', startIso.split('T')[0]).lte('date', endIso.split('T')[0]);
                    const tuData = (llData || []).filter(l => {
                        const t = String(l.transaction_t).toUpperCase(); const ty = String(l.type).toUpperCase(); const r = String(l.remarks).toUpperCase();
                        return t.includes('TARDINESS') || t.includes('UNDERTIME') || t.includes('GATE') || ty.includes('TARDINESS') || r.includes('TARDINESS');
                    });
                    if (!tuData.length) throw new Error("No Tardiness/Undertime data available.");

                    const sObj = {};
                    tuData.forEach(l => {
                        const eid = cleanId(l.emp_id);
                        if (!sObj[eid]) sObj[eid] = { count: 0, deduction: 0 };
                        sObj[eid].count++; sObj[eid].deduction += Math.abs(parseFloat(l.debit || 0));
                    });

                    const dGrps = {};
                    Object.keys(sObj).forEach(eid => {
                        const div = divMap[eid] || 'UNASSIGNED';
                        if(!dGrps[div]) dGrps[div] = [];
                        const row = sObj[eid];
                        dGrps[div].push([eid, nameMap[eid], (row.deduction * 8).toFixed(2), row.count.toString(), row.deduction.toFixed(3)]);
                    });

                    const h = ["EMP NUMBER", "NAME", "TOTAL HOURS", "TOTAL DAYS", "CREDIT TO VL"];
                    const w = [45, 90, 55, 55, 65];
                    for (const div in dGrps) startY = drawTableGroup(pdf, div, dGrps[div], h, w, x=>x, isAppend, appendLvl, startY);
                }

                else if (repType === "Flag Ceremony Attendance") {
                    const { data: fData } = await supabaseClient.from('flag_attendance').select('*').gte('date', startIso.split('T')[0]).lte('date', endIso.split('T')[0]);
                    if (!fData || !fData.length) throw new Error("No Flag Ceremony data available.");

                    const sObj = {};
                    fData.forEach(f => {
                        const eid = cleanId(f.emp_id);
                        if (!sObj[eid]) sObj[eid] = { p: 0, a: 0, details: [] };
                        const stat = String(f.status || f.remarks).toUpperCase();
                        const isAbs = stat.includes("ABSENT") || !f.time_in;
                        if(isAbs) sObj[eid].a++; else sObj[eid].p++;
                        sObj[eid].details.push(`${f.date}: ${isAbs ? 'ABSENT' : 'PRESENT'} [${format12h(f.time_in)}]`);
                    });

                    const dGrps = {};
                    Object.keys(sObj).forEach(eid => {
                        const div = divMap[eid] || 'UNASSIGNED';
                        if(!dGrps[div]) dGrps[div] = [];
                        const row = sObj[eid];
                        dGrps[div].push([eid, nameMap[eid], `P: ${row.p} | A: ${row.a}`, row.details.join(', ')]);
                    });

                    const h = ["EMP NUMBER", "NAME", "SUMMARY", "DETAILS (DATE: STATUS [TIME IN])"];
                    const w = [30, 60, 30, 190];
                    for (const div in dGrps) startY = drawTableGroup(pdf, div, dGrps[div], h, w, x=>x, isAppend, appendLvl, startY);
                }
                
                else if (repType === "PSO / TO Conflicts") {
                    const { data: toData } = await supabaseClient.from('travel_orders').select('*').eq('status', 'APPROVED');
                    const { data: itinData } = await supabaseClient.from('itinerary').select('*').gte('travel_date', startIso.split('T')[0]).lte('travel_date', endIso.split('T')[0]);
                    const { data: psoData } = await supabaseClient.from('pso_records').select('*').lte('start_date', endIso.split('T')[0]).gte('end_date', startIso.split('T')[0]);
                    if (!toData || !itinData || !psoData) throw new Error("Insufficient data to check conflicts.");

                    const validToNos = new Set(toData.map(t=>t.to_no));
                    const activeItins = itinData.filter(i => validToNos.has(i.to_no));

                    const dGrps = {}; let conflictCount = 0;
                    activeItins.forEach(i => {
                        const toObj = toData.find(t => t.to_no === i.to_no);
                        const eid = cleanId(toObj.emp_id);
                        const conflicts = psoData.filter(p => cleanId(p.emp_id) === eid && i.travel_date >= p.start_date && i.travel_date <= p.end_date);
                        if (conflicts.length > 0) {
                            conflictCount++;
                            const div = divMap[eid] || 'UNASSIGNED';
                            if(!dGrps[div]) dGrps[div] = [];
                            conflicts.forEach(c => { dGrps[div].push([eid, nameMap[eid], i.travel_date, c.subject || c.pso_no || '-', i.destination || '-', '-']); });
                        }
                    });
                    if (conflictCount === 0) throw new Error("No PSO/TO conflicts found for this period.");

                    const h = ["EMP NUMBER", "NAME", "DATE", "PSO", "TO", "RSO"];
                    const w = [35, 55, 35, 75, 75, 35];
                    for (const div in dGrps) startY = drawTableGroup(pdf, div, dGrps[div], h, w, x=>x, isAppend, appendLvl, startY);
                }

                pdf.save(`Consolidated_${repType.replace(/ /g, '_')}_${titleSuffix.replace(/ /g, '_')}.pdf`);
            }
            
            btn.disabled = false; btn.innerText = "GENERATE PDF REPORT"; status.innerText = "Report generated successfully.";

        } catch (e) {
            status.innerText = `Error: ${e.message}`;
            alert(e.message);
            btn.disabled = false; btn.innerText = "GENERATE PDF REPORT";
        }
    }
</script>
</body>
</html>
