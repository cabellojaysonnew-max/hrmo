<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Deep Research - Claims Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --color-primary: #003811; --color-secondary: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #F3F4F6; }
        .table-header { background-color: var(--color-primary); color: white; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-[#003811]">Finance Deep Research (Claims Tracking)</h1>
            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded font-bold hover:bg-red-700 transition-colors">Logout</button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="relative">
                    <label class="block text-sm font-bold text-[#003811] mb-1">Employee Name or ID</label>
                    <input type="text" id="employeeSearch" onkeyup="searchEmployees(this.value)" autocomplete="off" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811]" placeholder="Search name e.g., Jay...">
                    <input type="hidden" id="selectedEmpId">
                    
                    <div id="searchResults" class="absolute z-10 w-full bg-white border border-gray-300 rounded shadow-lg mt-1 hidden max-h-48 overflow-y-auto">
                        </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-[#003811] mb-1">Month</label>
                    <input type="month" id="searchMonth" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-[#003811]">
                </div>
                <div class="flex items-end">
                    <button onclick="researchEmployee()" class="bg-[#003811] text-white px-6 py-2 rounded font-bold w-full hover:bg-green-800 transition-colors">Research Claims</button>
                </div>
            </div>
            <p id="statusMsg" class="text-sm font-bold mt-4 min-h-[1.25rem]"></p>
        </div>

        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="table-header">
                        <th class="p-3 border">Date</th>
                        <th class="p-3 border">Travel Order (TO)</th>
                        <th class="p-3 border">PSO / RSO</th>
                        <th class="p-3 border text-center">Conflict Status</th>
                        <th class="p-3 border w-64">Claim Tagging</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    <tr><td colspan="5" class="p-4 text-center text-gray-500 font-medium">Search an employee and month to begin tracking claims.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    // Auth Check
    const userStr = sessionStorage.getItem('currentUser');
    if (!userStr) window.location.href = 'index.html';
    const user = JSON.parse(userStr);
    
    // Ensure unit is upper case to prevent login bypass issues
    const userUnit = (user.unit || "").toUpperCase().trim();
    if (userUnit !== 'BUDGET' && userUnit !== 'ACCOUNTING') window.location.href = 'index.html';

    function logout() {
        sessionStorage.clear();
        window.location.href = 'index.html';
    }

    // --- Autocomplete Search Logic ---
    let searchTimeout;
    async function searchEmployees(query) {
        const resultsDiv = document.getElementById('searchResults');
        
        // Reset hidden ID if user is typing manually
        document.getElementById('selectedEmpId').value = '';

        if (!query || query.length < 2) {
            resultsDiv.classList.add('hidden');
            return;
        }

        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            try {
                // CHANGED: Querying 'employees' instead of 'employee'
                const { data, error } = await supabaseClient
                    .from('employees') 
                    .select('emp_id, full_name')
                    .or(`full_name.ilike.%${query}%,emp_id.ilike.%${query}%`)
                    .limit(10);

                if (error) throw error;

                if (data && data.length > 0) {
                    resultsDiv.innerHTML = data.map(emp => `
                        <div class="p-3 hover:bg-green-50 cursor-pointer border-b text-sm transition-colors" 
                             onclick="selectEmployee('${emp.emp_id}', '${emp.full_name}')">
                            <span class="font-bold text-[#003811]">${emp.full_name}</span> 
                            <span class="text-gray-500 text-xs ml-2">ID: ${emp.emp_id}</span>
                        </div>
                    `).join('');
                    resultsDiv.classList.remove('hidden');
                } else {
                    resultsDiv.innerHTML = `<div class="p-3 text-sm text-gray-500 italic">No employees found matching "${query}"</div>`;
                    resultsDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Search error:", err);
            }
        }, 300);
    }

    function selectEmployee(empId, fullName) {
        document.getElementById('employeeSearch').value = fullName;
        document.getElementById('selectedEmpId').value = empId;
        document.getElementById('searchResults').classList.add('hidden');
    }

    // Close dropdown if clicked outside
    document.addEventListener('click', function(e) {
        const searchInput = document.getElementById('employeeSearch');
        const searchResults = document.getElementById('searchResults');
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.classList.add('hidden');
        }
    });
    // --------------------------------------

    async function researchEmployee() {
        // Use the hidden ID if they clicked a dropdown item, otherwise use what they typed
        const empId = document.getElementById('selectedEmpId').value || document.getElementById('employeeSearch').value.trim();
        const monthVal = document.getElementById('searchMonth').value;
        const statusMsg = document.getElementById('statusMsg');
        const tbody = document.getElementById('resultsTable');
        
        if (!empId || !monthVal) {
            statusMsg.innerText = "Please select an Employee and a Month.";
            statusMsg.className = "text-red-600 text-sm font-bold mt-4 min-h-[1.25rem]";
            return;
        }

        statusMsg.innerText = "Fetching records...";
        statusMsg.className = "text-blue-600 text-sm font-bold mt-4 min-h-[1.25rem]";
        tbody.innerHTML = "";

        const [year, month] = monthVal.split('-');
        const daysInMonth = new Date(year, month, 0).getDate();
        const startDate = `${year}-${month}-01`;
        const endDate = `${year}-${month}-${daysInMonth}`;

        try {
            // 1. Fetch Approved Travel Orders
            const { data: toData, error: toErr } = await supabaseClient
                .from('travel_orders')
                .select('to_no, status')
                .eq('emp_id', empId)
                .eq('status', 'APPROVED');
            if (toErr) throw toErr;

            let itineraries = [];
            if (toData && toData.length > 0) {
                const toNumbers = toData.map(t => t.to_no);
                const { data: itinData, error: itinErr } = await supabaseClient
                    .from('itinerary')
                    .select('*')
                    .in('to_no', toNumbers)
                    .gte('travel_date', startDate)
                    .lte('travel_date', endDate);
                if (itinErr) throw itinErr;
                itineraries = itinData || [];
            }

            // 2. Fetch PSOs
            const { data: psoData, error: psoErr } = await supabaseClient
                .from('pso_records')
                .select('*')
                .eq('emp_id', empId)
                .lte('start_date', endDate)
                .gte('end_date', startDate);
            if (psoErr) throw psoErr;

            // 3. Fetch Existing Claim Tags
            const { data: tagsData, error: tagsErr } = await supabaseClient
                .from('financial_claims')
                .select('*')
                .eq('emp_id', empId)
                .gte('claim_date', startDate)
                .lte('claim_date', endDate);
            if (tagsErr) throw tagsErr;

            const existingTags = {};
            if(tagsData) {
                tagsData.forEach(t => { existingTags[t.claim_date] = t; });
            }

            let foundActivity = false;

            // Build daily view
            for (let day = 1; day <= daysInMonth; day++) {
                const currentDate = `${year}-${month}-${String(day).padStart(2, '0')}`;
                
                const dayTOs = itineraries.filter(i => i.travel_date === currentDate);
                const dayPSOs = (psoData || []).filter(p => {
                    return currentDate >= p.start_date && currentDate <= p.end_date;
                });

                if (dayTOs.length === 0 && dayPSOs.length === 0) continue; 
                foundActivity = true;

                const hasConflict = dayTOs.length > 0 && dayPSOs.length > 0;
                const toRef = dayTOs.length > 0 ? dayTOs[0].to_no : '';
                const psoRef = dayPSOs.length > 0 ? dayPSOs[0].pso_no : '';

                const tagRecord = existingTags[currentDate] || {};
                const currentTag = tagRecord.acknowledged_type || '';

                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-gray-50 transition-colors";
                
                // CHANGED: Passed "this" as the first argument to updateTag
                tr.innerHTML = `
                    <td class="p-3 border font-semibold">${currentDate}</td>
                    <td class="p-3 border text-sm">
                        ${dayTOs.map(t => `<span class="font-bold text-green-700">${t.to_no}</span><br><span class="text-xs text-gray-600">${t.destination}</span>`).join('<hr class="my-1 border-gray-200">') || '<span class="text-gray-400">-</span>'}
                    </td>
                    <td class="p-3 border text-sm">
                        ${dayPSOs.map(p => `<span class="font-bold text-blue-700">${p.pso_no}</span><br><span class="text-xs text-gray-600">${p.subject}</span>`).join('<hr class="my-1 border-gray-200">') || '<span class="text-gray-400">-</span>'}
                    </td>
                    <td class="p-3 border text-center font-bold ${hasConflict ? 'text-red-600 bg-red-50' : 'text-gray-500'}">
                        ${hasConflict ? 'CONFLICT' : 'CLEAR'}
                    </td>
                    <td class="p-3 border">
                        <select onchange="updateTag(this, '${empId}', '${currentDate}', this.value, '${toRef}', '${psoRef}')" class="w-full border border-gray-300 p-2 rounded text-sm focus:outline-none focus:border-[#003811] ${currentTag ? 'bg-green-50 font-semibold' : ''}">
                            <option value="">-- Select Tag --</option>
                            ${dayTOs.length > 0 ? `<option value="TO" ${currentTag === 'TO' ? 'selected' : ''}>Acknowledge TO (${toRef})</option>` : ''}
                            ${dayPSOs.length > 0 ? `<option value="PSO" ${currentTag === 'PSO' ? 'selected' : ''}>Acknowledge PSO (${psoRef})</option>` : ''}
                            <option value="NONE" ${currentTag === 'NONE' ? 'selected' : ''}>Void Both / None</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            }

            if (!foundActivity) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-500 font-medium">No TOs or PSOs found for this employee in ${monthVal}.</td></tr>`;
            }

            statusMsg.innerText = "Research complete.";
            statusMsg.className = "text-green-600 text-sm font-bold mt-4 min-h-[1.25rem]";

        } catch (error) {
            statusMsg.innerText = "Error: " + error.message;
            statusMsg.className = "text-red-600 text-sm font-bold mt-4 min-h-[1.25rem]";
            console.error(error);
        }
    }

    // CHANGED: Added selectElement parameter so we can apply styles directly to it
    async function updateTag(selectElement, empId, date, type, toRef, psoRef) {
        if(!type) return;
        
        let refNo = '';
        if (type === 'TO') refNo = toRef;
        if (type === 'PSO') refNo = psoRef;

        try {
            const { error } = await supabaseClient
                .from('financial_claims')
                .upsert({ 
                    emp_id: empId, 
                    claim_date: date, 
                    acknowledged_type: type,
                    reference_no: refNo
                }, { onConflict: 'emp_id, claim_date' });

            if (error) throw error;
            
            // Apply visual feedback safely using the passed element
            selectElement.classList.add('bg-green-50', 'font-semibold');

        } catch (error) {
            alert("Error saving tag: " + error.message);
        }
    }
</script>
</body>
</html>
