<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAR Integrated System Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root {
            --color-primary: #003811;
            --color-secondary: #D4AF37;
            --color-surface: #FFFFFF;
            --color-text-main: #1F2937;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #F3F4F6; }
        .btn-primary { background-color: var(--color-primary); color: white; transition: all 0.2s ease; }
        .btn-primary:hover { background-color: #006400; transform: translateY(-1px); }
        .form-input { width: 100%; background: #F9FAFB; border: 1px solid #D1D5DB; border-radius: 0.375rem; padding: 0.5rem; font-size: 0.875rem; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--color-primary); margin-bottom: 0.25rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="flex h-screen bg-gray-100">
        <div class="hidden md:flex flex-col w-[400px] bg-[#003811] text-white p-12 justify-center">
            <h1 class="text-4xl font-serif font-bold leading-tight uppercase tracking-widest">DAR Integrated<br>System</h1>
            <p class="mt-4 text-sm font-semibold tracking-wide text-[#D4AF37] uppercase">Provincial Office of Camarines Sur I</p>
        </div>
        <div class="flex-1 flex items-center justify-center p-8">
            <div class="bg-white rounded-lg shadow w-full max-w-md p-10 border-t-4 border-[#D4AF37]">
                <h2 class="text-2xl font-bold text-[#003811] mb-6">SECURE ACCESS</h2>
                <div class="space-y-4">
                    <div><label class="form-label">Username</label><input type="text" id="username" class="form-input"></div>
                    <div><label class="form-label">Password</label><input type="password" id="password" class="form-input" onkeypress="if(event.key === 'Enter') login()"></div>
                </div>
                <p id="loginStatus" class="text-red-600 text-xs font-bold mt-4 min-h-[1rem]"></p>
                <button onclick="login()" id="loginBtn" class="w-full btn-primary py-3 rounded-md font-bold mt-6">LOG IN</button>
            </div>
        </div>
    </div>

<script>
    // Redirect if already logged in based on role, unit, and position
    if (sessionStorage.getItem('currentUser')) {
        const user = JSON.parse(sessionStorage.getItem('currentUser'));
        if (user.role === 'VEHICLE_APPROVER') {
            window.location.href = 'fleet.html';
        } else if ((user.role && user.role.toUpperCase().includes('PSO ENCODER')) || user.position === 'UNIT_HEAD') {
            window.location.href = 'pso_encoder.html';
        } else if (user.unit === 'BUDGET' || user.unit === 'ACCOUNTING') {
            window.location.href = 'finance_dashboard.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    }

    async function login() {
        const u = document.querySelector('#username').value.trim();
        const p = document.querySelector('#password').value.trim();
        const btn = document.querySelector('#loginBtn');
        const status = document.querySelector('#loginStatus');
        
        if(!u || !p) return;
        btn.innerText = "AUTHENTICATING..."; btn.disabled = true;
        status.innerText = "";
        
        try {
            const { data, error } = await supabaseClient.from('Users').select('*').eq('username', u).single();
            if (error) throw new Error("Authentication failed");
            if (data && data.password === p) {
                // Save user session
                sessionStorage.setItem('currentUser', JSON.stringify(data));
                
                // Route based on role, unit, and position
                if (data.role === 'VEHICLE_APPROVER') {
                    window.location.href = 'fleet.html';
                } else if ((data.role && data.role.toUpperCase().includes('PSO ENCODER')) || data.position === 'UNIT_HEAD') {
                    window.location.href = 'pso_encoder.html';
                } else if (data.unit === 'BUDGET' || data.unit === 'ACCOUNTING') {
                    window.location.href = 'finance_dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else { throw new Error("Invalid Credentials"); }
        } catch (e) { 
            status.innerText = e.message; 
            btn.innerText = "LOG IN"; 
            btn.disabled = false; 
        }
    }
</script>
</body>
</html>
