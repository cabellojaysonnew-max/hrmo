<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Terminal - DAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #003811; overflow: hidden; color: white; }
        .clock-text { font-size: 5rem; font-weight: bold; line-height: 1; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); color: #D4AF37; }
        .date-text { font-size: 1.5rem; font-weight: 600; color: #E5E7EB; }
        
        /* HARDWARE ACCELERATED CAMERA CONTAINERS */
        #face-video-container { position: relative; width: 100%; max-width: 450px; border-radius: 1rem; overflow: hidden; border: 4px solid #D4AF37; box-shadow: 0 10px 25px rgba(0,0,0,0.5); background: #000; will-change: transform; transform: translateZ(0); }
        #face-video { width: 100%; height: auto; transform: scaleX(-1); will-change: transform; }
        
        #qr-video-container { width: 250px; height: 250px; border-radius: 0.5rem; overflow: hidden; border: 2px solid #6B7280; background: #000; position: relative; will-change: transform; transform: translateZ(0); }
        
        .scanner-input { background: rgba(255,255,255,0.1); border: 2px solid #D4AF37; color: white; text-align: center; font-size: 1.5rem; font-weight: bold; letter-spacing: 0.1em; outline: none; transition: all 0.2s; }
        .scanner-input:focus { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        
        .toast-enter { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #settings-modal { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex h-screen items-center justify-center relative p-8">

    <div class="absolute top-4 left-4">
        <button onclick="openSettings()" class="bg-gray-800 text-white p-3 rounded-full shadow-lg hover:bg-gray-700 transition" title="Camera Settings">⚙️ Setup</button>
    </div>

    <div class="absolute top-4 right-4 flex flex-col gap-2 items-end z-10">
        <div id="networkStatus" class="px-4 py-2 rounded-full font-bold text-sm bg-green-600 shadow-lg flex items-center gap-2 transition-colors duration-300">
            <div class="w-3 h-3 rounded-full bg-white animate-pulse"></div>SYSTEM ONLINE
        </div>
        <button onclick="syncLogs(true)" id="queueBadge" class="px-4 py-2 rounded-full font-bold text-xs bg-gray-600 text-white shadow-lg cursor-pointer transition-colors duration-300">
            0 PENDING LOGS
        </button>
    </div>

    <div class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
        
        <div class="lg:col-span-5 flex flex-col items-center justify-center gap-6">
            <div class="flex flex-col items-center">
                <div id="face-video-container">
                    <video id="face-video" autoplay playsinline muted></video>
                    <div class="absolute bottom-2 left-0 w-full text-center">
                        <span class="bg-black/70 px-3 py-1 rounded text-[10px] tracking-widest uppercase font-bold text-[#D4AF37]">📸 PHOTO AUDIT CAMERA</span>
                    </div>
                </div>
                <canvas id="canvas" class="hidden"></canvas>
            </div>

            <div class="flex flex-col items-center bg-white/5 p-4 rounded-xl border border-white/10 w-full max-w-[450px]">
                <h3 class="text-xs font-bold text-gray-300 uppercase tracking-widest mb-2 text-center">SCAN QR ID HERE</h3>
                <div id="qr-reader" class="w-full max-w-[300px] overflow-hidden rounded border-2 border-dashed border-gray-400"></div>
                <p class="text-[10px] text-gray-400 mt-2 text-center uppercase" id="qr-status">Initializing Scanner...</p>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col items-center justify-center text-center">
            <div class="mb-8">
                <h1 class="text-3xl font-bold uppercase tracking-widest text-gray-300 mb-2">Department of Agrarian Reform</h1>
                <div id="clock" class="clock-text">--:--:-- --</div>
                <div id="date" class="date-text mt-2">Loading Date...</div>
            </div>

            <div class="w-full max-w-md bg-white/10 p-6 rounded-xl backdrop-blur-md border border-white/20 shadow-2xl">
                <p class="mb-2 text-xs font-bold text-[#D4AF37] uppercase tracking-wider">Manual ID Entry (Fallback)</p>
                <div class="flex gap-2">
                    <input type="text" id="empIdInput" class="scanner-input flex-1 py-3 rounded-lg" placeholder="ID Number..." autocomplete="off">
                    <button onclick="handleManualInput()" class="bg-[#D4AF37] text-[#003811] px-6 rounded-lg font-bold uppercase hover:bg-yellow-500 transition-colors">ENTER</button>
                </div>
            </div>

            <div id="resultCard" class="hidden mt-8 w-full max-w-lg bg-white p-8 rounded-xl shadow-2xl toast-enter border-l-8">
                <div class="flex justify-between items-start mb-2">
                    <p id="resTime" class="text-gray-500 text-sm font-bold"></p>
                    <span id="flagBadge" class="hidden bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-1 rounded border border-blue-300 uppercase tracking-widest">Flag Ceremony Logged</span>
                </div>
                <h2 id="resName" class="text-3xl font-black text-[#003811] mb-1 leading-tight"></h2>
                <p id="resDivision" class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4"></p>
                <p id="resStatus" class="text-4xl font-black uppercase tracking-widest"></p>
                <p class="text-xs text-gray-400 font-bold mt-4">Data secured. Ready for next scan.</p>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
        <div class="bg-white text-gray-800 p-8 rounded-xl w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-black text-[#003811] mb-6 uppercase border-b pb-2">Hardware Setup</h2>
            <div class="space-y-4">
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Face Capture Camera (Photo)</label><select id="sel-face-cam" class="w-full p-2 border rounded bg-gray-50 text-sm"></select></div>
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">QR Scanner Camera</label><select id="sel-qr-cam" class="w-full p-2 border rounded bg-gray-50 text-sm"></select></div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="saveSettings()" class="flex-1 bg-[#003811] text-white py-3 rounded font-bold hover:bg-green-800 transition">SAVE & RESTART</button>
                <button onclick="closeSettings()" class="px-6 bg-gray-200 text-gray-700 py-3 rounded font-bold hover:bg-gray-300 transition">CANCEL</button>
            </div>
        </div>
    </div>

<script>
    // PERFORMANCE CONFIG
    const DEVICE_ID = "TERMINAL_01"; 
    const SYNC_INTERVAL_MS = 60 * 60 * 1000; 
    const SCAN_COOLDOWN_MS = 3000; 

    let faceVideo = document.getElementById('face-video');
    let canvas = document.getElementById('canvas');
    let isOnline = navigator.onLine;
    let resetTimer = null;
    let cachedEmployees = {}; 
    let isProcessing = false;

    let html5QrCode = null;
    let faceStream = null;
    let prefFaceCam = localStorage.getItem('prefFaceCam');
    let prefQRCam = localStorage.getItem('prefQRCam');

    window.onload = async () => {
        startClock();
        updateNetworkStatus();
        updateQueueCounter();
        
        // Non-blocking initialization
        setTimeout(async () => {
            if (isOnline) await syncEmployeeCache();
            await populateCameras();
            startCameras();
        }, 100);

        window.addEventListener('online', () => { isOnline = true; updateNetworkStatus(); syncLogs(false); });
        window.addEventListener('offline', () => { isOnline = false; updateNetworkStatus(); });

        setInterval(() => syncLogs(false), SYNC_INTERVAL_MS);
        
        document.getElementById('empIdInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') handleManualInput();
        });
        
        // Keep input focused for pure hardware scanners
        document.addEventListener('click', (e) => {
            if(!e.target.closest('#settings-modal') && e.target.tagName !== 'BUTTON') {
                document.getElementById('empIdInput').focus();
            }
        });
    };

    function get12HourTime(dateObj) {
        let hours = dateObj.getHours();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; 
        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
        const seconds = String(dateObj.getSeconds()).padStart(2, '0');
        return { hours, minutes, seconds, ampm, formattedString: `${String(hours).padStart(2, '0')}:${minutes} ${ampm}` };
    }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            const t = get12HourTime(now);
            document.getElementById('clock').innerText = `${String(t.hours).padStart(2, '0')}:${t.minutes}:${t.seconds} ${t.ampm}`;
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
        }, 1000);
    }

    function updateNetworkStatus() {
        const indicator = document.getElementById('networkStatus');
        if (isOnline) {
            indicator.className = "px-4 py-2 rounded-full font-bold text-sm bg-green-600 shadow-lg flex items-center gap-2 transition-colors duration-300";
            indicator.innerHTML = `<div class="w-3 h-3 rounded-full bg-white animate-pulse"></div> SYSTEM ONLINE`;
        } else {
            indicator.className = "px-4 py-2 rounded-full font-bold text-sm bg-red-600 shadow-lg flex items-center gap-2 transition-colors duration-300";
            indicator.innerHTML = `<div class="w-3 h-3 rounded-full bg-white"></div> OFFLINE MODE`;
        }
    }

    async function populateCameras() {
        try {
            await navigator.mediaDevices.getUserMedia({video: true}); 
            const devices = await Html5Qrcode.getCameras();
            if (devices && devices.length) {
                if (!prefFaceCam) prefFaceCam = devices[0].id;
                if (!prefQRCam) prefQRCam = devices.length > 1 ? devices[1].id : devices[0].id;
                
                const sFace = document.getElementById('sel-face-cam');
                const sQR = document.getElementById('sel-qr-cam');
                sFace.innerHTML = ''; sQR.innerHTML = '';
                
                devices.forEach(d => {
                    sFace.innerHTML += `<option value="${d.id}" ${d.id === prefFaceCam ? 'selected' : ''}>${d.label || d.id}</option>`;
                    sQR.innerHTML += `<option value="${d.id}" ${d.id === prefQRCam ? 'selected' : ''}>${d.label || d.id}</option>`;
                });
            }
        } catch (e) {
            document.getElementById('qr-status').innerText = "CAMERA ACCESS DENIED";
        }
    }

    async function startCameras() {
        if (faceStream) { faceStream.getTracks().forEach(t => t.stop()); }
        try {
            faceStream = await navigator.mediaDevices.getUserMedia({ 
                video: { deviceId: prefFaceCam ? { exact: prefFaceCam } : undefined, width: { ideal: 640 }, height: { ideal: 480 } } 
            });
            faceVideo.srcObject = faceStream;
        } catch (err) {}

        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch(e) {}
            html5QrCode.clear();
        }
        
        if (prefQRCam) {
            html5QrCode = new Html5Qrcode("qr-reader");
            // OPTIMIZATION: Reduced FPS and disabled flip for CPU efficiency
            const config = { fps: 4, qrbox: { width: 250, height: 250 }, disableFlip: true };
            
            html5QrCode.start(
                prefQRCam, config, 
                (decodedText) => {
                    const empId = decodedText.trim();
                    if(!isProcessing && empId) processAttendance(empId);
                }, 
                (error) => {}
            ).then(() => {
                document.getElementById('qr-status').innerText = "SCANNER ACTIVE";
                document.getElementById('qr-status').className = "text-[10px] font-bold text-green-500 mt-2 text-center uppercase";
            }).catch(err => {
                document.getElementById('qr-status').innerText = "SCANNER ERROR";
            });
        }
    }

    // OPTIMIZATION: Aggressive downscaling and compression
    function captureFaceImage() {
        if (!faceVideo.videoWidth) return null;
        const context = canvas.getContext('2d', { alpha: false }); // Disable alpha for speed
        const targetWidth = 320; 
        const scale = targetWidth / faceVideo.videoWidth;
        canvas.width = targetWidth;
        canvas.height = faceVideo.videoHeight * scale;
        
        context.drawImage(faceVideo, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.4); // 40% Quality JPEG
    }

    function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
    function saveSettings() {
        prefFaceCam = document.getElementById('sel-face-cam').value;
        prefQRCam = document.getElementById('sel-qr-cam').value;
        localStorage.setItem('prefFaceCam', prefFaceCam);
        localStorage.setItem('prefQRCam', prefQRCam);
        closeSettings();
        startCameras();
    }

    async function syncEmployeeCache() {
        try {
            const { data, error } = await supabaseClient.from('employees').select('*');
            if (!error && data) {
                cachedEmployees = {};
                data.forEach(e => cachedEmployees[e.emp_id] = e);
                localStorage.setItem('masterEmployeeCache', JSON.stringify(cachedEmployees));
            }
        } catch (e) {}
    }

    function getEmployeeData(empId) {
        if (Object.keys(cachedEmployees).length === 0) {
            const stored = localStorage.getItem('masterEmployeeCache');
            if (stored) cachedEmployees = JSON.parse(stored);
        }
        return cachedEmployees[empId] || { emp_id: empId, full_name: "Unknown ID", last_name: "", first_name: "", division: "UNKNOWN" };
    }

    function handleManualInput() {
        const input = document.getElementById('empIdInput');
        const empId = input.value.trim();
        input.value = '';
        if (empId) processAttendance(empId);
    }

    function processAttendance(empId) {
        if (isProcessing) return;
        isProcessing = true;

        const now = new Date();
        const todayDate = now.toISOString().split('T')[0];
        const logTimeISO = now.toISOString();
        const t12 = get12HourTime(now); 
        
        // 1. Instantly update UI for immediate feedback
        const emp = getEmployeeData(empId);
        let logType = determineStatusLocal(empId, todayDate);
        let colorClass = logType.includes("OUT") ? "border-orange-500 text-orange-600" : "border-green-500 text-green-600";
        const isMonday = now.getDay() === 1;
        let isFlagLogged = (isMonday && logType === "TIME IN");

        showResult(emp.full_name, emp.division, logType, colorClass, t12.formattedString, isFlagLogged);

        // 2. Process heavy lifting (Image + Queueing) asynchronously
        setTimeout(() => {
            const base64Image = captureFaceImage();
            
            queueSyncTask('attendance_logs', {
                emp_id: empId,
                log_time: logTimeISO,
                device_id: DEVICE_ID,
                capture_image: base64Image
            });

            if (isFlagLogged) {
                queueSyncTask('flag_attendance', {
                    emp_id: empId,
                    date: todayDate,
                    time_in: t12.formattedString,
                    last_name: emp.last_name || 'N/A',
                    first_name: emp.first_name || 'N/A',
                    division: emp.division || 'N/A',
                    status: 'PRESENT'
                });
            }
        }, 10); // 10ms delay yields thread to browser to render the UI card first

        // Cooldown reset
        setTimeout(() => { isProcessing = false; }, SCAN_COOLDOWN_MS);
    }

    function determineStatusLocal(empId, todayDate) {
        let history = JSON.parse(localStorage.getItem('dailyStatusToggle') || '{}');
        if (!history[todayDate]) history = {}; 
        if (!history[todayDate]) history[todayDate] = {};
        
        let currentStatus = history[todayDate][empId] || "OUT";
        let nextStatus = currentStatus === "OUT" ? "TIME IN" : "TIME OUT";
        
        history[todayDate][empId] = nextStatus === "TIME IN" ? "IN" : "OUT";
        localStorage.setItem('dailyStatusToggle', JSON.stringify(history));
        return nextStatus;
    }

    function queueSyncTask(table, payload) {
        let queue = JSON.parse(localStorage.getItem('syncQueue') || '[]');
        queue.push({ table: table, data: payload, id: Date.now() + Math.random() });
        localStorage.setItem('syncQueue', JSON.stringify(queue));
        updateQueueCounter();
        
        if (isOnline) {
            // Debounce automatic syncs to prevent hammering the network
            clearTimeout(window.autoSyncTimer);
            window.autoSyncTimer = setTimeout(() => syncLogs(false), 2000);
        }
    }

    function updateQueueCounter() {
        const queue = JSON.parse(localStorage.getItem('syncQueue') || '[]');
        const badge = document.getElementById('queueBadge');
        badge.innerText = `${queue.length} PENDING LOGS`;
        badge.className = queue.length > 0 
            ? "px-4 py-2 rounded-full font-bold text-xs bg-yellow-400 text-black shadow-lg cursor-pointer hover:bg-yellow-500 transition z-10" 
            : "px-4 py-2 rounded-full font-bold text-xs bg-gray-600 text-white shadow-lg cursor-pointer z-10";
    }

    async function syncLogs(manual = false) {
        if (!isOnline) {
            if (manual) alert("Cannot sync. Terminal is offline.");
            return;
        }
        
        let queue = JSON.parse(localStorage.getItem('syncQueue') || '[]');
        if (queue.length === 0) {
            if (manual) alert("All logs are already synced.");
            return;
        }

        if (manual) document.getElementById('queueBadge').innerText = "SYNCING...";

        let failedQueue = [];
        
        for (let task of queue) {
            try {
                const { error } = await supabaseClient.from(task.table).insert([task.data]);
                if (error) failedQueue.push(task); 
            } catch (e) {
                failedQueue.push(task);
            }
        }

        localStorage.setItem('syncQueue', JSON.stringify(failedQueue));
        updateQueueCounter();
        
        if (manual && failedQueue.length === 0) alert("All pending logs synced successfully.");
        else if (manual && failedQueue.length > 0) alert(`${failedQueue.length} logs failed to sync. Will retry automatically.`);
    }

    function showResult(name, division, status, colorClass, timeString, isFlagLogged) {
        const card = document.getElementById('resultCard');
        const flagBadge = document.getElementById('flagBadge');
        
        document.getElementById('resTime').innerText = `Logged at ${timeString}`;
        document.getElementById('resName').innerText = name;
        document.getElementById('resDivision').innerText = division || "";
        document.getElementById('resStatus').innerText = status;
        document.getElementById('resStatus').className = `text-4xl font-black uppercase tracking-widest ${colorClass}`;
        
        if (isFlagLogged) flagBadge.classList.remove('hidden');
        else flagBadge.classList.add('hidden');

        card.className = `mt-8 w-full max-w-lg bg-white p-8 rounded-xl shadow-2xl toast-enter border-l-8 ${colorClass}`;
        card.classList.remove('hidden');

        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
            card.classList.add('hidden');
            document.getElementById('empIdInput').focus();
        }, 10000);
    }
</script>
</body>
</html>
